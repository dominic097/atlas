<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlas Recall — Automation Library</title>
<style>
  /* ============================== THEME TOKENS ============================== */
  :root {
    --bg: #0a0c10;
    --surface: #0f1217;
    --surface2: #13171e;
    --border: #1e242d;
    --text: #e7ebf0;
    --muted: #8b95a4;
    --accent: #6366f1;
    --accent2: #a78bfa;
    --success: #34d399;
    --warn: #fbbf24;
    --danger: #fb7185;
    --grid: #1a2029;

    --c0: #6366f1; --c1: #a78bfa; --c2: #34d399; --c3: #60a5fa; --c4: #fbbf24; --c5: #fb7185;

    --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-pill: 999px;
    --sh-sm: 0 1px 2px rgba(0,0,0,.2);
    --sh-md: 0 12px 30px -16px rgba(0,0,0,.6);
    --sh-lg: 0 22px 70px -26px rgba(0,0,0,.55);
    --sh-glow: 0 0 0 1px rgba(99,102,241,.22), 0 22px 70px -26px rgba(99,102,241,.4);

    --font: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: "Space Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

    --fs-display: 34px; --fs-h1: 26px; --fs-h2: 20px; --fs-h3: 16px;
    --fs-body: 13px; --fs-small: 12px; --fs-micro: 11px;

    --accent-soft: rgba(99,102,241,.14);
    --accent-soft2: rgba(167,139,250,.14);
    --success-soft: rgba(52,211,153,.13);
    --warn-soft: rgba(251,191,36,.14);
    --danger-soft: rgba(251,113,133,.14);
  }
  [data-theme="light"] {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --surface2: #f1f3f7;
    --border: #e4e8ef;
    --text: #1c2433;
    --muted: #6b7385;
    --accent: #4f46e5;
    --accent2: #6d4bd6;
    --success: #16a34a;
    --warn: #d97706;
    --danger: #dc2626;
    --grid: #e9edf3;

    --c0: #4f46e5; --c1: #6d4bd6; --c2: #16a34a; --c3: #2563eb; --c4: #d97706; --c5: #dc2626;

    --sh-md: 0 12px 30px -18px rgba(20,30,60,.25);
    --sh-lg: 0 22px 70px -30px rgba(20,30,60,.25);
    --sh-glow: 0 0 0 1px rgba(79,70,229,.18), 0 22px 60px -30px rgba(79,70,229,.32);

    --accent-soft: rgba(79,70,229,.10);
    --accent-soft2: rgba(109,75,214,.10);
    --success-soft: rgba(22,163,74,.10);
    --warn-soft: rgba(217,119,6,.12);
    --danger-soft: rgba(220,38,38,.10);
  }

  /* ============================== RESET / BASE ============================== */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: var(--fs-body);
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background .25s ease, color .25s ease;
  }
  ::selection { background: var(--accent-soft); }
  a { color: inherit; }
  button { font-family: inherit; cursor: pointer; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-sm); }

  .mono { font-family: var(--mono); }
  .muted { color: var(--muted); }
  .nowrap { white-space: nowrap; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ============================== APP SHELL ============================== */
  .app { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 232px; flex: 0 0 232px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
  }
  .brand { display: flex; align-items: center; gap: 11px; padding: 18px 18px 16px; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 9px; flex: 0 0 34px;
    background: linear-gradient(140deg, var(--accent), var(--accent2));
    display: grid; place-items: center; color: #fff;
    box-shadow: var(--sh-glow);
  }
  .brand-mark svg { width: 19px; height: 19px; }
  .brand-name { font-size: 15px; font-weight: 700; letter-spacing: -.2px; }
  .brand-sub { font-size: var(--fs-micro); color: var(--muted); margin-top: 1px; display: flex; align-items: center; gap: 5px; }
  .live-dot { width: 6px; height: 6px; border-radius: 99px; background: var(--success); box-shadow: 0 0 0 0 var(--success); animation: pulse 2.4s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(52,211,153,.5);} 70%{box-shadow:0 0 0 6px rgba(52,211,153,0);} 100%{box-shadow:0 0 0 0 rgba(52,211,153,0);} }

  .nav { padding: 8px 10px; display: flex; flex-direction: column; gap: 2px; }
  .nav-label { font-size: var(--fs-micro); font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); padding: 14px 10px 6px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--r-sm);
    color: var(--muted); border: none; background: transparent; width: 100%; text-align: left;
    font-size: var(--fs-body); font-weight: 500;
    transition: background .14s, color .14s;
  }
  .nav-item svg { width: 16px; height: 16px; flex: 0 0 16px; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--text); }
  .nav-item.active svg { color: var(--accent); }
  .nav-item .nav-count {
    margin-left: auto; font-size: var(--fs-micro); font-weight: 600;
    background: var(--surface2); color: var(--muted);
    padding: 1px 7px; border-radius: var(--r-pill); min-width: 22px; text-align: center;
  }
  .nav-item.active .nav-count { background: rgba(99,102,241,.2); color: var(--accent); }
  .nav-item.has-alert .nav-count { background: var(--warn-soft); color: var(--warn); }

  .sidebar-footer { margin-top: auto; padding: 14px; border-top: 1px solid var(--border); }
  .save-card {
    background: linear-gradient(150deg, var(--accent-soft), var(--accent-soft2));
    border: 1px solid var(--border); border-radius: var(--r-md);
    padding: 12px 13px;
  }
  .save-card .lbl { font-size: var(--fs-micro); color: var(--muted); text-transform: uppercase; letter-spacing: .6px; font-weight: 600; }
  .save-card .val { font-size: 20px; font-weight: 800; letter-spacing: -.5px; margin-top: 3px; }
  .save-card .sub { font-size: var(--fs-micro); color: var(--success); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
  .save-card .sub svg { width: 12px; height: 12px; }

  /* Main */
  .main { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; }

  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--bg) 78%, transparent);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 40;
  }
  .topbar h1 { font-size: var(--fs-h2); font-weight: 700; letter-spacing: -.3px; margin: 0; }
  .topbar .crumb { font-size: var(--fs-small); color: var(--muted); margin-top: 2px; }
  .topbar-spacer { flex: 1; }

  .global-search {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r-pill); padding: 7px 14px; min-width: 260px;
    transition: border-color .15s, box-shadow .15s;
  }
  .global-search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .global-search svg { width: 15px; height: 15px; color: var(--muted); flex: 0 0 15px; }
  .global-search input { background: transparent; border: none; color: var(--text); font-size: var(--fs-body); width: 100%; outline: none; }
  .global-search input::placeholder { color: var(--muted); }
  .global-search kbd {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; background: var(--surface2);
  }

  .icon-btn {
    display: grid; place-items: center; width: 34px; height: 34px;
    border-radius: var(--r-sm); border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    transition: color .15s, border-color .15s, background .15s;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--muted); }
  .icon-btn svg { width: 17px; height: 17px; }

  .avatar {
    width: 34px; height: 34px; border-radius: var(--r-pill);
    background: linear-gradient(140deg, var(--accent2), var(--accent));
    color: #fff; display: grid; place-items: center; font-weight: 700; font-size: 12px;
  }

  .content { padding: 22px 28px 60px; }

  /* ============================== KPI STRIP ============================== */
  .kpi-strip {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 20px;
  }
  .kpi {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md);
    padding: 13px 15px; position: relative; overflow: hidden;
  }
  .kpi .kicon { position: absolute; top: 12px; right: 12px; color: var(--muted); opacity: .55; }
  .kpi .kicon svg { width: 16px; height: 16px; }
  .kpi .klabel { font-size: var(--fs-micro); color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .kpi .kval { font-size: 23px; font-weight: 800; letter-spacing: -.6px; margin-top: 6px; line-height: 1.05; }
  .kpi .kval .unit { font-size: 13px; font-weight: 600; color: var(--muted); margin-left: 2px; }
  .kpi .kdelta { font-size: var(--fs-micro); margin-top: 5px; display: flex; align-items: center; gap: 4px; }
  .kpi .kdelta svg { width: 12px; height: 12px; }
  .kdelta.up { color: var(--success); }
  .kdelta.down { color: var(--danger); }
  .kdelta.flat { color: var(--muted); }
  .kpi .spark { margin-top: 8px; height: 26px; width: 100%; }

  /* ============================== TOOLBAR / FILTERS ============================== */
  .lib-toolbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 18px;
  }
  .lib-search {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r-md); padding: 8px 12px; flex: 1 1 280px; max-width: 420px;
    transition: border-color .15s, box-shadow .15s;
  }
  .lib-search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .lib-search svg { width: 16px; height: 16px; color: var(--muted); flex: 0 0 16px; }
  .lib-search input { background: transparent; border: none; color: var(--text); width: 100%; outline: none; font-size: var(--fs-body); }
  .lib-search input::placeholder { color: var(--muted); }

  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-group .fg-label { font-size: var(--fs-micro); color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-right: 2px; }
  .chip {
    border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    border-radius: var(--r-pill); padding: 5px 12px; font-size: var(--fs-small); font-weight: 500;
    transition: all .14s; display: inline-flex; align-items: center; gap: 6px;
  }
  .chip:hover { color: var(--text); border-color: var(--muted); }
  .chip.active { background: var(--accent-soft); color: var(--accent); border-color: transparent; font-weight: 600; }
  .chip .dot { width: 7px; height: 7px; border-radius: 99px; }

  .select {
    appearance: none; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--r-md); padding: 8px 30px 8px 12px; font-size: var(--fs-body);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238b95a4' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat: no-repeat; background-position: right 10px center;
    transition: border-color .15s;
  }
  .select:hover { border-color: var(--muted); }

  .toolbar-spacer { flex: 1; }
  .view-toggle { display: flex; border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; }
  .view-toggle button { background: var(--surface); border: none; color: var(--muted); padding: 8px 11px; display: grid; place-items: center; }
  .view-toggle button svg { width: 16px; height: 16px; }
  .view-toggle button.active { background: var(--accent-soft); color: var(--accent); }
  .view-toggle button + button { border-left: 1px solid var(--border); }

  .result-count { font-size: var(--fs-small); color: var(--muted); }

  /* ============================== AUTOMATION GRID ============================== */
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 14px;
  }
  .grid.list-mode { grid-template-columns: 1fr; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: 16px 17px 14px; position: relative; text-align: left; width: 100%;
    transition: border-color .16s, box-shadow .16s, transform .16s;
    display: flex; flex-direction: column; gap: 12px;
  }
  .card:hover { border-color: var(--accent); box-shadow: var(--sh-md); transform: translateY(-1px); }
  .card:focus-visible { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); outline: none; }
  .card.selected { border-color: var(--accent); box-shadow: var(--sh-glow); }

  .card-top { display: flex; align-items: flex-start; gap: 11px; }
  .kind-icon {
    width: 38px; height: 38px; flex: 0 0 38px; border-radius: 10px;
    display: grid; place-items: center;
    background: var(--accent-soft); color: var(--accent);
  }
  .kind-icon.k-script { background: var(--success-soft); color: var(--success); }
  .kind-icon.k-workflow { background: var(--accent-soft2); color: var(--accent2); }
  .kind-icon svg { width: 19px; height: 19px; }
  .card-title-wrap { min-width: 0; flex: 1; }
  .card-title { font-size: var(--fs-h3); font-weight: 700; letter-spacing: -.2px; margin: 0; line-height: 1.25; }
  .card-slug { font-size: var(--fs-micro); color: var(--muted); margin-top: 2px; }
  .stale-dot {
    width: 9px; height: 9px; border-radius: 99px; flex: 0 0 9px; margin-top: 5px;
    background: var(--success); box-shadow: 0 0 0 3px var(--success-soft);
  }
  .stale-dot.drift { background: var(--danger); box-shadow: 0 0 0 3px var(--danger-soft); }

  .badge {
    font-size: var(--fs-micro); font-weight: 600; padding: 2px 9px; border-radius: var(--r-pill);
    display: inline-flex; align-items: center; gap: 5px; text-transform: capitalize; white-space: nowrap;
  }
  .badge .bdot { width: 6px; height: 6px; border-radius: 99px; }
  .badge.trusted { background: var(--success-soft); color: var(--success); }
  .badge.validating { background: var(--accent-soft); color: var(--accent); }
  .badge.candidate { background: var(--warn-soft); color: var(--warn); }
  .badge.stale { background: var(--danger-soft); color: var(--danger); }
  .badge.gated { background: var(--warn-soft); color: var(--warn); }

  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .meta-pill {
    font-size: var(--fs-micro); color: var(--muted); background: var(--surface2);
    border-radius: var(--r-sm); padding: 2px 8px; display: inline-flex; align-items: center; gap: 5px;
  }
  .meta-pill svg { width: 11px; height: 11px; }

  .card-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
  .cstat .cs-val { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
  .cstat .cs-lbl { font-size: var(--fs-micro); color: var(--muted); margin-top: 1px; }

  .card-spark { height: 32px; width: 100%; }

  .card-foot {
    display: flex; align-items: center; gap: 8px; padding-top: 11px; border-top: 1px solid var(--border);
  }
  .agree-bar { flex: 1; height: 5px; border-radius: 99px; background: var(--surface2); overflow: hidden; }
  .agree-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .agree-label { font-size: var(--fs-micro); color: var(--muted); white-space: nowrap; }
  .open-hint { font-size: var(--fs-micro); color: var(--accent); display: flex; align-items: center; gap: 3px; opacity: 0; transition: opacity .15s; }
  .open-hint svg { width: 12px; height: 12px; }
  .card:hover .open-hint { opacity: 1; }

  /* list mode tweaks */
  .grid.list-mode .card { flex-direction: row; align-items: center; gap: 18px; padding: 14px 18px; }
  .grid.list-mode .card-top { flex: 0 0 300px; }
  .grid.list-mode .card-spark { display: none; }
  .grid.list-mode .card-stats { flex: 0 0 230px; }
  .grid.list-mode .card-meta { flex: 1; }
  .grid.list-mode .card-foot { border: none; padding: 0; flex: 0 0 190px; }

  /* ============================== CANDIDATES ============================== */
  .cand-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
  table.cand { width: 100%; border-collapse: collapse; font-size: var(--fs-body); }
  table.cand thead th {
    text-align: left; font-size: var(--fs-micro); text-transform: uppercase; letter-spacing: .6px;
    color: var(--muted); font-weight: 600; padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface2); position: sticky; top: 0; user-select: none;
  }
  table.cand thead th.sortable { cursor: pointer; }
  table.cand thead th.sortable:hover { color: var(--text); }
  table.cand thead th .sort-ind { font-size: 9px; margin-left: 4px; opacity: .6; }
  table.cand tbody td { padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  table.cand tbody tr:last-child td { border-bottom: none; }
  table.cand tbody tr { transition: background .12s; }
  table.cand tbody tr:hover { background: var(--surface2); }
  .cand-prompt { font-family: var(--mono); font-size: var(--fs-small); }
  .cand-exemplar { font-size: var(--fs-micro); color: var(--muted); margin-top: 3px; }
  .hotscore { font-weight: 700; font-variant-numeric: tabular-nums; }
  .hotbar { height: 5px; border-radius: 99px; background: var(--surface2); margin-top: 5px; overflow: hidden; width: 120px; }
  .hotbar > div { height: 100%; background: linear-gradient(90deg, var(--warn), var(--danger)); border-radius: 99px; }
  .verdict {
    font-size: var(--fs-micro); font-weight: 600; padding: 3px 10px; border-radius: var(--r-pill);
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .verdict svg { width: 12px; height: 12px; }
  .verdict.yes { background: var(--success-soft); color: var(--success); }
  .verdict.gated { background: var(--warn-soft); color: var(--warn); }
  .verdict.no { background: var(--danger-soft); color: var(--danger); }
  .verdict.unknown { background: var(--surface2); color: var(--muted); }

  .btn {
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    border-radius: var(--r-sm); padding: 7px 13px; font-size: var(--fs-small); font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px; transition: all .14s;
  }
  .btn:hover { border-color: var(--muted); }
  .btn svg { width: 14px; height: 14px; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.success { background: var(--success); border-color: var(--success); color: #06281c; }
  .btn.ghost { background: transparent; }
  .btn.danger { color: var(--danger); border-color: transparent; background: var(--danger-soft); }
  .btn.danger:hover { background: color-mix(in srgb, var(--danger-soft) 70%, var(--danger)); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn.sm { padding: 5px 10px; font-size: var(--fs-micro); }

  /* ============================== SECTION HEADERS ============================== */
  .section-head { display: flex; align-items: baseline; gap: 12px; margin: 6px 0 14px; }
  .section-head h2 { font-size: var(--fs-h3); font-weight: 700; margin: 0; }
  .section-head .desc { font-size: var(--fs-small); color: var(--muted); }

  .pill-tabs { display: inline-flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 3px; gap: 2px; }
  .pill-tabs button {
    background: transparent; border: none; color: var(--muted); padding: 6px 14px;
    border-radius: var(--r-sm); font-size: var(--fs-small); font-weight: 600; transition: all .14s;
  }
  .pill-tabs button.active { background: var(--accent-soft); color: var(--accent); }
  .pill-tabs button:hover:not(.active) { color: var(--text); }
  .pill-tabs .tcount { font-size: 10px; opacity: .8; margin-left: 5px; }

  /* ============================== DRAWER ============================== */
  .scrim {
    position: fixed; inset: 0; background: rgba(4,6,10,.55); backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none; transition: opacity .22s; z-index: 60;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100vh; width: min(720px, 94vw);

function fmtNum(n){ return n.toLocaleString("en-US"); }
function fmtCompact(n){
  if(n>=1e9) return (n/1e9).toFixed(2).replace(/\.0+$/,"")+"B";
  if(n>=1e6) return (n/1e6).toFixed(2).replace(/\.0+$/,"")+"M";
  if(n>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,"")+"K";
  return String(n);
}
function pct(x){ return (x*100).toFixed(1)+"%"; }
function timeAgo(iso){
  const d = new Date(iso); const now = new Date("2026-06-30T09:42:00Z");
  const s = Math.floor((now - d)/1000);
  if(s<60) return s+"s";
  if(s<3600) return Math.floor(s/60)+"m";
  if(s<86400) return Math.floor(s/3600)+"h";
  return Math.floor(s/86400)+"d";
}

function sparklinePath(values, w, h, pad){
  pad = pad || 2;
  const min = Math.min(...values), max = Math.max(...values);
  const range = (max - min) || 1;
  const step = (w - pad*2) / (values.length - 1);
  return values.map((v,i)=>{
    const x = pad + i*step;
    const y = h - pad - ((v - min)/range)*(h - pad*2);
    return (i===0?"M":"L") + x.toFixed(1) + " " + y.toFixed(1);
  }).join(" ");
}
function makeSparkline(values, w, h, color, fill){
  const line = sparklinePath(values, w, h, 2);
  const area = line + ` L ${w-2} ${h-2} L 2 ${h-2} Z`;
  const gid = "sg"+Math.random().toString(36).slice(2,8);
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" width="100%" height="${h}" aria-hidden="true">
    ${fill?`<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
      <path d="${area}" fill="url(#${gid})"/>`:""}
    <path d="${line}" fill="none" stroke="${color}" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}
/* deterministic pseudo-spark per automation so cards look alive */
function autoSpark(a){
  const seed = a.hits + a.version*7;
  const arr = [];
  let v = 40 + (seed % 30);
  for(let i=0;i<16;i++){
    v += Math.sin(seed + i*1.3)*8 + ((seed*(i+3))%11) - 4;
    if(a.state==="stale" && i>10) v -= 6;
    arr.push(Math.max(8, v));
  }
  return arr;
}

/* code tokenizer (lightweight, lang-aware-ish) */
function tintCode(line, lang){
  let s = line.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // comments
  if(/^\s*#/.test(line) && (lang==="python"||lang==="bash")){
    return `<span class="tok-com">${s}</span>`;
  }
  if(/^\s*\/\//.test(line)){
    return `<span class="tok-com">${s}</span>`;
  }
  // strings
  s = s.replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, m=>`<span class="tok-str">${m}</span>`);
  // keywords
  const kws = ["export","async","function","const","let","return","await","def","for","in","if","else","not","lambda","import","from","set","echo"];
  s = s.replace(new RegExp("\\b("+kws.join("|")+")\\b","g"), '<span class="tok-kw">$1</span>');
  // numbers
  s = s.replace(/\b(\d+)\b/g, '<span class="tok-num">$1</span>');
  return s;
}

}

function donutSVG(tiers, total){
  const R=52, C=64, sw=20, circ=2*Math.PI*R;
  let off=0;
  const segs = tiers.map(t=>{
    const frac = t.count/total;
    const len = frac*circ;
    const seg = `<circle cx="${C}" cy="${C}" r="${R}" fill="none" stroke="${t.color}" stroke-width="${sw}"
      stroke-dasharray="${len.toFixed(2)} ${(circ-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}"
      transform="rotate(-90 ${C} ${C})"/>`;
    off += len;
    return seg;
  }).join("");
  return `<svg width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Request tier donut">
    <circle cx="${C}" cy="${C}" r="${R}" fill="none" stroke="var(--surface2)" stroke-width="${sw}"/>
    ${segs}
    <text x="${C}" y="${C-4}" text-anchor="middle" font-size="20" font-weight="800" fill="var(--text)">${pct((total-tiers[3].count)/total).replace('.0','')}</text>
    <text x="${C}" y="${C+13}" text-anchor="middle" font-size="9" fill="var(--muted)">avoided LLM</text>
  </svg>`;
}

function filteredAutomations(){

  list.sort((a,b)=> (STATE.pinned.has(b.id)?1:0)-(STATE.pinned.has(a.id)?1:0));

const VERDICT_META = {
  yes:{cls:"yes",icon:"check",label:"Automatable"},
  gated:{cls:"gated",icon:"shieldCheck",label:"Gated"},
  no:{cls:"no",icon:"x",label:"Not automatable"},
  unknown:{cls:"unknown",icon:"alertTriangle",label:"Unknown"}
};

function paintCandidates(){
  const tb = $("#candBody");
  if(!tb) return;
  const q = STATE.search.trim().toLowerCase();
  // candidates = clusters not yet trusted/automated as a stable automation. Show validating/candidate/stale + unknowns.
  let list = DATA.clusters.filter(c=>{
    if(STATE.filterAutomatable!=="all" && c.automatable!==STATE.filterAutomatable) return false;
    if(q){ const hay=(c.promptNorm+" "+c.exemplar+" "+c.repo).toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  });
  const k=STATE.candSort, dir=STATE.candDir;
  list.sort((a,b)=>{
    let x=a[k], y=b[k];
    if(typeof x==="string") return x.localeCompare(y)*-dir;
    return (x-y)*dir;
  });
  const maxHot = Math.max(...DATA.clusters.map(c=>c.hotScore));
  // sort indicator
  $$("[data-csort]").forEach(th=>{
    th.querySelector(".sort-ind")?.remove();
    if(th.dataset.csort===k){
      const i=document.createElement("span"); i.className="sort-ind"; i.textContent=dir<0?"▼":"▲"; th.appendChild(i);
    }
  });
  if(!list.length){
    tb.innerHTML = `<tr><td colspan="7"><div class="empty">${svg("search")}<div>No clusters match.</div></div></td></tr>`;
    return;
  }
  tb.innerHTML = list.map(c=>{
    const vm = VERDICT_META[c.automatable]||VERDICT_META.unknown;
    const isAutomated = c.state==="automated";
    const distillable = ["yes","gated"].includes(c.automatable) && !isAutomated;
    return `<tr>
      <td>
        <div class="cand-prompt">${c.promptNorm}</div>
        <div class="cand-exemplar">e.g. “${c.exemplar}” · ${svg("gitBranch")} ${c.repo}</div>
      </td>
      <td><span class="mono">${fmtNum(c.frequency)}</span></td>
      <td><span class="meta-pill">${svg("users")} ${c.distinctUsers}</span></td>
      <td><span class="mono">${fmtCompact(c.avgTokens)}</span></td>
      <td>
        <span class="hotscore">${c.hotScore.toLocaleString()}</span>
        <div class="hotbar"><div style="width:${Math.max(3,(c.hotScore/maxHot*100)).toFixed(1)}%"></div></div>
      </td>
      <td><span class="verdict ${vm.cls}">${svg(vm.icon)} ${vm.label}</span></td>
      <td style="text-align:right">
        ${isAutomated
          ? `<span class="badge trusted" style="background:var(--success-soft)">${svg("check")} Automated</span>`
          : distillable
            ? `<button class="btn primary sm" data-distill="${c.id}">${svg("sparkles")} Distill</button>`
            : `<button class="btn ghost sm" disabled title="Not eligible">—</button>`}
      </td>
    </tr>`;
  }).join("");
  $$("[data-distill]").forEach(b=>b.addEventListener("click",()=>{
    const c = DATA.clusters.find(x=>x.id===b.dataset.distill);
    toast(`Distilling “${c.promptNorm}” → candidate automation`);
    b.outerHTML = `<span class="badge validating">${svg("refresh")} Distilling…</span>`;
  }));
}

  const pinned = STATE.pinned.has(a.id);
  return `
    <div class="drawer-head">
      <div class="dh-icon ${km.cls==='k-script'?'':''}" style="background:${km.cls==='k-script'?'var(--success-soft)':km.cls==='k-workflow'?'var(--accent-soft2)':'var(--accent-soft)'};color:${km.cls==='k-script'?'var(--success)':km.cls==='k-workflow'?'var(--accent2)':'var(--accent)'}">${svg(km.icon)}</div>
      <div style="min-width:0">
        <div class="drawer-title">${a.title}</div>
        <div class="drawer-sub">
          <span class="mono">${a.slug}</span>
          <span class="badge ${a.state}"><span class="bdot" style="background:currentColor"></span>${STATE_LABEL[a.state]||a.state}</span>
          <span>${km.label} · v${a.version}</span>
          ${a.requiresApproval?`<span class="badge gated">${svg("shieldCheck")} Gated</span>`:""}
        </div>
      </div>
      <button class="icon-btn drawer-close" id="drawerClose" aria-label="Close detail">${svg("x")}</button>
    </div>

    <div class="drawer-actions">
      <button class="btn primary" id="runBtn">${svg("play")} ${a.requiresApproval?'Request run':'Replay'}</button>
      <button class="btn" id="pinBtn">${svg("pin")} ${pinned?'Unpin':'Pin'}</button>
      ${drift?`<button class="btn" id="recomputeBtn">${svg("refresh")} Recompute</button>`:""}
      <div style="flex:1"></div>
      <button class="btn danger" id="evictBtn">${svg("x")} Evict</button>
    </div>

    ${drift?`<div style="padding:14px 22px 0"><div class="contract-banner drift">${svg("alertTriangle")} Staleness contract broke — automation de-advertised pending recompute.</div></div>`:""}

    <div class="drawer-tabs" role="tablist">
      <button data-dtab="workflow" class="active" role="tab">Cowork</button>
      <button data-dtab="staleness" role="tab">Staleness</button>
      <button data-dtab="history" role="tab">Versions</button>
      <button data-dtab="provenance" role="tab">Provenance</button>
    </div>

    <div class="drawer-body">
      <div class="dpane active" data-dpane="workflow">${coworkPaneHTML(a)}</div>
      <div class="dpane" data-dpane="staleness">${stalenessPaneHTML(a)}</div>
      <div class="dpane" data-dpane="history">${historyPaneHTML(a)}</div>
      <div class="dpane" data-dpane="provenance">${provenancePaneHTML(a)}</div>
    </div>
  `;
}

function coworkPaneHTML(a){
  const wf = a.workflow;
  // build edge condition lookup
  const condTo = {};
  wf.edges.forEach(e=>{ condTo[e.from]=e.condition; });
  const steps = wf.steps.map((s,i)=>{
    const irr = !s.reversible;
    return `
    <div class="wf-step">
      <div class="wf-rail">
        <div class="wf-node ${irr?'irreversible':''}">${i+1}</div>
        ${i<wf.steps.length-1?'<div class="wf-line"></div>':''}
      </div>
      <div class="wf-content">
        <div class="wf-name">${s.name}</div>
        <div class="wf-tags">
          <span class="wf-tag">${s.type}</span>
          <span class="wf-tag ${irr?'irr':'rev'}">${irr?'irreversible':'reversible'}</span>
        </div>
        ${condTo[s.id]?`<div class="wf-edge">→ if <span style="color:var(--accent2)">${condTo[s.id]}</span></div>`:''}
      </div>
    </div>`;
  }).join("");

  const art = a.artifact;
  const codeLines = art.bodyExcerpt.map((l,i)=>`<span class="ln">${i+1}</span>${tintCode(l, art.lang)}`).join("\n");

  const vars = a.context.variables;
  const kvHTML = Object.entries(vars).map(([k,v])=>`
    <div class="kv"><div class="k">${k}</div><div class="v">${Array.isArray(v)?v.join(", "):v}</div></div>`).join("");

  const findings = a.context.findings;
  const findHTML = Object.entries(findings).map(([k,v])=>`
    <div class="finding">${svg("sparkles")}<span class="fk">${k}</span><span class="fv">${Array.isArray(v)?v.join(", "):v}</span></div>`).join("");

  const refs = a.context.referenced.map(r=>`<span class="ref-chip">${svg("fileCode")} ${r}</span>`).join(" ");

  const params = a.params.map(p=>`<span class="ref-chip"><strong style="color:var(--text)">${p.name}</strong>: ${p.type}${p.required?'':' <span class="muted">(opt)</span>'}</span>`).join(" ");

  return `
    <div class="pane-block">
      <h3>${svg("gitBranch")} Parameters</h3>
      <div style="display:flex;gap:7px;flex-wrap:wrap">${params}</div>
    </div>

    <div class="pane-block">
      <h3>${svg("list")} Workflow · steps (Progress)</h3>
      <div class="wf-timeline">${steps}</div>
    </div>

    <div class="pane-block">
      <h3>${svg("fileCode")} Script artifact (Working folder)</h3>
      <div class="code-card">
        <div class="code-head">${svg("terminal")}<span class="cf-name">${art.name}</span><span class="lang-pill">${art.lang}</span></div>
        <pre class="code"><code>${codeLines}</code></pre>
      </div>
    </div>

    <div class="pane-block">
      <h3>${svg("database")} Context / memory (mutable)</h3>
      <div class="kv-grid">${kvHTML}</div>
      <div style="margin:14px 0 8px;font-size:var(--fs-micro);text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600">Findings</div>
      <div class="findings-list">${findHTML}</div>
      <div style="margin:14px 0 8px;font-size:var(--fs-micro);text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600">Referenced files</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">${refs}</div>
    </div>
  `;
}

function stalenessPaneHTML(a){
  const st = a.staleness;
  const banner = st.drifted
    ? `<div class="contract-banner drift">${svg("alertTriangle")} Contract broken — ${st.signals.filter(s=>!s.fresh).length} signal(s) drifted. Automation is de-advertised until recompute.</div>`
    : `<div class="contract-banner ok">${svg("shieldCheck")} All change-metric signals fresh — automation is trusted and advertised.</div>`;
  const rows = st.signals.map(s=>`
    <div class="signal-row">
      <div class="sig-status ${s.fresh?'fresh':'stale'}">${svg(s.fresh?'check':'alertTriangle')}</div>
      <div class="sig-body">
        <div class="sig-type">${s.type} <span class="sig-strat">${s.strategy}</span></div>
        <div class="sig-detail">${s.detail}</div>
      </div>
    </div>`).join("");
  return `${banner}
    <div class="pane-block" style="margin-bottom:0">
      <h3>${svg("refresh")} Change-metric signals</h3>
      ${rows}
    </div>
    <p class="muted" style="font-size:var(--fs-small);margin-top:16px">
      Atlas tracks <span class="mono">code / config / data / time / external</span> signals per automation. Each is either a stored <em>fingerprint</em> or a live <em>probe</em>. The first one that drifts breaks the contract and triggers recompute.
    </p>`;
}

function historyPaneHTML(a){
  const notes = (VERSION_NOTES[a.slug.split("-")[0]] || VERSION_NOTES[Object.keys(VERSION_NOTES).find(k=>a.slug.includes(k))] || []).slice(0, a.version);
  // synth timestamps stepping back ~5 days per version
  const base = new Date("2026-06-30T09:00:00Z");
  const rows = [];
  for(let v=a.version; v>=1; v--){
    const idx = a.version - v;
    const note = notes[v-1] || (v===a.version?"Current version":"Earlier revision");
    const d = new Date(base - idx*4.6*86400000);
    rows.push(`
      <div class="ver-item">
        <div class="ver-tag">v${v}</div>
        <div class="ver-body">
          <div class="ver-note">${note}${v===a.version?' <span class="badge trusted" style="margin-left:6px">current</span>':''}</div>
          <div class="ver-time">${d.toISOString().slice(0,10)} · ${a.provenance.author}</div>
        </div>
      </div>`);
  }
  return `
    <div class="pane-block" style="margin-bottom:18px">
      <h3>${svg("clock")} Version history</h3>
      ${rows.join("")}
    </div>
    <div class="kv-grid">
      <div class="kv"><div class="k">Current version</div><div class="v">v${a.version}</div></div>
      <div class="kv"><div class="k">Total replays</div><div class="v">${fmtNum(a.hits)}</div></div>
      <div class="kv"><div class="k">Baseline / run</div><div class="v">${fmtNum(a.baselineTokensPerRun)} tok</div></div>
      <div class="kv"><div class="k">Replay / run</div><div class="v">${fmtNum(a.replayTokensPerRun)} tok</div></div>
    </div>`;
}

function provenancePaneHTML(a){
  const p = a.provenance;
  const cluster = DATA.clusters.find(c=>c.id===p.minedFromCluster);
  return `
    <div class="pane-block">
      <h3>${svg("sparkles")} How this was distilled</h3>
      <div class="prov-grid">
        <div class="kv"><div class="k">Mined from cluster</div><div class="v">${p.minedFromCluster}</div></div>
        <div class="kv"><div class="k">Source connector</div><div class="v">${p.connector}</div></div>
        <div class="kv"><div class="k">Author</div><div class="v">${p.author}</div></div>
        <div class="kv"><div class="k">Approved by</div><div class="v">${p.approvedBy || '— awaiting'}</div></div>
      </div>
    </div>
    ${cluster?`
    <div class="pane-block">
      <h3>${svg("activity")} Originating prompt cluster</h3>
      <div class="signal-row">
        <div class="sig-status fresh">${svg("search")}</div>
        <div class="sig-body">
          <div class="sig-type" style="font-family:var(--mono);text-transform:none">${cluster.promptNorm}</div>
          <div class="sig-detail">e.g. “${cluster.exemplar}”</div>
        </div>
      </div>
      <div class="kv-grid" style="margin-top:10px">
        <div class="kv"><div class="k">Frequency</div><div class="v">${fmtNum(cluster.frequency)}</div></div>
        <div class="kv"><div class="k">Distinct users</div><div class="v">${cluster.distinctUsers}</div></div>
        <div class="kv"><div class="k">HotScore</div><div class="v">${cluster.hotScore.toLocaleString()}</div></div>
        <div class="kv"><div class="k">Last seen</div><div class="v">${timeAgo(cluster.lastSeen)} ago</div></div>
      </div>
    </div>`:''}
    <div class="pane-block" style="margin-bottom:0">
      <h3>${svg("trendUp")} Economics</h3>
      <div class="findings-list">
        <div class="finding">${svg("sparkles")}<span class="fk">Lifetime tokens saved</span><span class="fv">${fmtNum(a.tokensSaved)}</span></div>
        <div class="finding">${svg("bolt")}<span class="fk">Cost reduction / run</span><span class="fv">${Math.round(a.baselineTokensPerRun/a.replayTokensPerRun)}×</span></div>
        <div class="finding">${svg("shieldCheck")}<span class="fk">Agreement rate</span><span class="fv">${pct(a.agreementRate)}</span></div>
      </div>
    </div>`;
}

function wireDrawer(a){
  $("#drawerClose").addEventListener("click", closeDrawer);
  $$("[data-dtab]").forEach(b=>b.addEventListener("click",()=>{
    STATE.drawerTab=b.dataset.dtab;
    $$("[data-dtab]").forEach(x=>x.classList.toggle("active",x===b));
    $$("[data-dpane]").forEach(p=>p.classList.toggle("active",p.dataset.dpane===b.dataset.dtab));
  }));
  $("#runBtn").addEventListener("click",()=>{
    if(a.requiresApproval) toast(`Run request for ${a.slug} sent to approval queue`);
    else toast(`Replayed ${a.slug} · ${a.replayTokensPerRun} tokens`);
  });
  $("#pinBtn").addEventListener("click",()=>{
    if(STATE.pinned.has(a.id)){ STATE.pinned.delete(a.id); } else { STATE.pinned.add(a.id); }
    toast(STATE.pinned.has(a.id)?"Pinned":"Unpinned");
    $("#pinBtn").innerHTML = `${svg("pin")} ${STATE.pinned.has(a.id)?'Unpin':'Pin'}`;
  });
  const rc = $("#recomputeBtn");
  if(rc) rc.addEventListener("click",()=>toast(`Recomputing ${a.slug}… re-probing change signals`));
  $("#evictBtn").addEventListener("click",()=>{ toast(`Evicted ${a.slug} from registry`); closeDrawer(); });
}

/* ============================================================================
   APPROVALS
   ============================================================================ */
function renderApprovals(){
  const open = DATA.approvals.filter(ap=>!STATE.approvalsHandled[ap.id]);
  content.innerHTML = `
    <div class="contract-banner" style="background:var(--warn-soft);color:var(--warn);max-width:none;margin-bottom:18px">
      ${svg("shieldCheck")} <span><strong>${open.length} gated automation${open.length!==1?'s':''}</strong> awaiting human approval. These have an irreversible side-effect (deploy) and never auto-run.</span>
    </div>
    <div id="apList">${open.map(approvalHTML).join("") || emptyApprovals()}</div>
  `;
  wireApprovals();
}
function emptyApprovals(){
  return `<div class="empty">${svg("check")}<div>Approval queue is clear.</div></div>`;
}
function approvalHTML(ap){
  const auto = DATA.automations.find(a=>a.slug===ap.automationSlug);
  const isProd = ap.params.env==="prod";
  return `
  <div class="approval-card" data-apr="${ap.id}">
    <div class="warn-icon">${svg("alertTriangle")}</div>
    <div class="ap-body">
      <div class="ap-title">${auto?auto.title.replace('{service}',ap.params.service).replace('{env}',ap.params.env):ap.automationSlug}</div>
      <div class="ap-params">${Object.entries(ap.params).map(([k,v])=>`${k}=${v}`).join(" · ")}</div>
      <div class="ap-blast">${svg("layers")} <strong>Blast radius:</strong> ${ap.blastRadius}</div>
      <div class="ap-meta">
        <span>${svg("users")} requested by <span class="mono">${ap.requestedBy}</span></span>
        <span>${svg("clock")} ${timeAgo(ap.requestedAt)} ago</span>
        ${isProd?`<span class="badge danger" style="background:var(--danger-soft);color:var(--danger)">production</span>`:`<span class="badge validating">staging</span>`}
      </div>
    </div>
    <div class="ap-actions">
      <button class="btn success" data-approve="${ap.id}">${svg("check")} Approve & run</button>
      <button class="btn danger" data-reject="${ap.id}">${svg("x")} Reject</button>
    </div>
  </div>`;
}
function wireApprovals(){
  $$("[data-approve]").forEach(b=>b.addEventListener("click",()=>{
    STATE.approvalsHandled[b.dataset.approve]="approved";
    const card = b.closest("[data-apr]");
    card.style.transition="opacity .3s,transform .3s"; card.style.opacity="0"; card.style.transform="translateX(20px)";
    toast("Approved — deploy dispatched");
    setTimeout(()=>{ updateApprovalCount(); renderApprovals(); },320);
  }));
  $$("[data-reject]").forEach(b=>b.addEventListener("click",()=>{
    STATE.approvalsHandled[b.dataset.reject]="rejected";
    const card = b.closest("[data-apr]");
    card.style.transition="opacity .3s,transform .3s"; card.style.opacity="0"; card.style.transform="translateX(20px)";
    toast("Request rejected");
    setTimeout(()=>{ updateApprovalCount(); renderApprovals(); },320);
  }));
}
function updateApprovalCount(){
  const open = DATA.approvals.filter(ap=>!STATE.approvalsHandled[ap.id]).length;
  const el=$("#nav-apr-count"); if(el) el.textContent=open;
}

/* ============================================================================
   LIVE FEED
   ============================================================================ */
const CONN_LABEL = {claude:"claude",codex:"codex",cowork:"cowork"};
function renderFeed(){
  content.innerHTML = `
    <div class="lib-toolbar">
      <label class="lib-search" aria-label="Filter events">
        ${svg("search")}
        <input id="feedSearch" type="text" placeholder="Filter by prompt, repo, user…" />
      </label>
      <div class="filter-group" role="group" aria-label="Filter by served-by tier">
        <span class="fg-label">Served by</span>
        ${[["all","All"],["automation","Automation"],["exact","Exact"],["semantic","Semantic"],["live","Live LLM"]].map(([v,l])=>`
          <button class="chip ${STATE._feedFilter===v||(!STATE._feedFilter&&v==='all')?'active':''}" data-ffeed="${v}">${l}</button>`).join("")}
      </div>
      <div class="toolbar-spacer"></div>
      <span class="result-count" id="feedCount"></span>
    </div>
    <div class="feed" id="feedList"></div>
  `;
  $("#feedSearch").addEventListener("input", e=>{ STATE._feedSearch=e.target.value; paintFeed(); });
  $$("[data-ffeed]").forEach(b=>b.addEventListener("click",()=>{
    STATE._feedFilter=b.dataset.ffeed;
    $$("[data-ffeed]").forEach(x=>x.classList.toggle("active",x===b));
    paintFeed();
  }));
  paintFeed();
}
function paintFeed(){
  const list = $("#feedList"); if(!list) return;
  const f = STATE._feedFilter||"all";
  const q = (STATE._feedSearch||"").trim().toLowerCase();
  const rows = DATA.events.filter(e=>{
    if(f!=="all" && e.servedBy!==f) return false;
    if(q){ const hay=(e.prompt+" "+e.repo+" "+e.userHash+" "+e.connector).toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  });
  $("#feedCount").textContent = `${rows.length} event${rows.length!==1?'s':''}`;
  if(!rows.length){ list.innerHTML = `<div class="empty">${svg("activity")}<div>No matching events.</div></div>`; return; }
  list.innerHTML = rows.map(e=>`
    <div class="feed-row">
      <span class="served-tag ${e.servedBy}">${e.servedBy}</span>
      <span class="conn-badge">${CONN_LABEL[e.connector]||e.connector}</span>
      <span class="feed-prompt mono">${e.prompt}</span>
      <span class="feed-user">${e.userHash}</span>
      <span class="feed-tokens" style="color:${e.tokens>2000?'var(--danger)':e.tokens<100?'var(--success)':'var(--text)'}">${fmtNum(e.tokens)}</span>
      <span class="feed-time">${timeAgo(e.ts)} ago</span>
    </div>`).join("");
}

/* ============================================================================
   THEME + GLOBAL WIRING
   ============================================================================ */
function setTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  const sun="M12 3v2 M12 19v2 M5 5l1.4 1.4 M17.6 17.6L19 19 M3 12h2 M19 12h2 M5 19l1.4-1.4 M17.6 6.4L19 5 M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z";
  const moon="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z";
  const d = t==="dark" ? moon : sun;
  $("#themeIcon").innerHTML = d.split(/\s(?=M)/).map(p=>`<path d="${p}"/>`).join("");
  // re-render current view so SVG gradients pick up new --accent etc.
  if(STATE.view==="overview") renderOverview();
  else if(STATE.view==="library") renderLibrary();
}

document.addEventListener("DOMContentLoaded", ()=>{
  // nav
  $$(".nav-item").forEach(b=>b.addEventListener("click",()=>setView(b.dataset.view)));
  // theme
  $("#themeToggle").addEventListener("click",()=>{
    const cur = document.documentElement.getAttribute("data-theme");
    setTheme(cur==="dark"?"light":"dark");
  });
  // global search → jumps to library and filters
  $("#globalSearch").addEventListener("input", e=>{
    STATE.search = e.target.value;
    if(STATE.view!=="library"){ STATE.libTab="library"; setView("library"); }
    else { renderLibrary(); }
    const inp=$("#libSearch"); if(inp){ inp.value=e.target.value; }
  });
  // keyboard: / focuses search, esc closes drawer
  document.addEventListener("keydown", e=>{
    if(e.key==="/" && document.activeElement.tagName!=="INPUT"){ e.preventDefault(); $("#globalSearch").focus(); }
    if(e.key==="Escape"){ closeDrawer(); }
  });
  $("#scrim").addEventListener("click", closeDrawer);

  setTheme("dark");
  setView("library");
});
</script>
</body>
</html>
