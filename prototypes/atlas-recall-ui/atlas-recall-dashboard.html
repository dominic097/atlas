<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atlas Recall — Token-Savings Command Center</title>
<!--
  Atlas Recall — UNIFIED dashboard.
  Fuses Option A "Mission Control" (observability + token-savings command center)
  with Option C "Cowork Flow" (automation lifecycle, Cowork three-pane detail,
  human-approval workflow).

  Product story made visible everywhere:
    repeated org prompts  ->  mined (hot clusters)  ->  judged automatable
    ->  distilled into reusable automations  ->  REPLAY DETERMINISTICALLY (~0 LLM)
    instead of re-reasoning.  Every view answers "how much are we saving?" (A)
    or "can I trust / approve this automation?" (C).

  FULLY SELF-CONTAINED: all CSS, vanilla JS, mock data, and inline-SVG icons.
  ZERO external / CDN deps (only SVG xmlns where needed). Renders offline via
  file://, embeddable via //go:embed and served by 'atlas serve'.

  TDZ SAFETY (Option C previously crashed here): strict source ordering —
    1) constants + pure helpers (no DOM, no state)
    2) const state = {...}   (declared BEFORE any function that reads it)
    3) all render*/view* fns + setTheme (reference state, run later)
    4) addEventListener wiring + bindMain()
    5) ONE initial render call as the very last statement.
-->
<style>
/* ============================================================
   THEME TOKENS  (byte-identical across A, C, spec.json.palette)
   ============================================================ */
:root {
  --bg:#0a0c10; --surface:#0f1217; --surface2:#13171e; --border:#1e242d;
  --text:#e7ebf0; --muted:#8b95a4; --accent:#6366f1; --accent2:#a78bfa;
  --success:#34d399; --warn:#fbbf24; --danger:#fb7185; --grid:#1a2029;
  --c0:#6366f1; --c1:#a78bfa; --c2:#34d399; --c3:#60a5fa; --c4:#fbbf24; --c5:#fb7185;
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-pill:999px;
  --sh-sm:0 1px 2px rgba(0,0,0,.2);
  --sh-md:0 12px 30px -16px rgba(0,0,0,.6);
  --sh-lg:0 22px 70px -26px rgba(0,0,0,.55);
  --sh-glow:0 0 0 1px rgba(99,102,241,.22), 0 22px 70px -26px rgba(99,102,241,.4);
  --accent-soft:rgba(99,102,241,.14); --accent-line:rgba(99,102,241,.35);
  --success-soft:rgba(52,211,153,.13); --warn-soft:rgba(251,191,36,.13); --danger-soft:rgba(251,113,133,.13);
  --font:Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --mono:"Space Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
}
html[data-theme="light"] {
  --bg:#f7f8fa; --surface:#ffffff; --surface2:#f1f3f7; --border:#e4e8ef;
  --text:#1c2433; --muted:#6b7385; --accent:#4f46e5; --accent2:#6d4bd6;
  --success:#16a34a; --warn:#d97706; --danger:#dc2626; --grid:#e9edf3;
  --c0:#4f46e5; --c1:#6d4bd6; --c2:#16a34a; --c3:#2563eb; --c4:#d97706; --c5:#dc2626;
  --sh-md:0 12px 30px -18px rgba(20,30,60,.22);
  --sh-lg:0 22px 60px -30px rgba(20,30,60,.25);
  --sh-glow:0 0 0 1px rgba(79,70,229,.18), 0 18px 50px -26px rgba(79,70,229,.3);
  --accent-soft:rgba(79,70,229,.1); --accent-line:rgba(79,70,229,.3);
  --success-soft:rgba(22,163,74,.1); --warn-soft:rgba(217,119,6,.12); --danger-soft:rgba(220,38,38,.1);
}
* { box-sizing:border-box; }
html, body { height:100%; }
body {
  margin:0; background:var(--bg); color:var(--text); font-family:var(--font);
  font-size:13px; line-height:1.45; -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale; letter-spacing:.005em;
}
::selection { background:var(--accent-soft); }
button { font-family:inherit; color:inherit; cursor:pointer; }
a { color:inherit; }
.mono { font-family:var(--mono); }
.muted { color:var(--muted); }

/* Scrollbars */
*::-webkit-scrollbar { width:10px; height:10px; }
*::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; border:2px solid var(--bg); }
*::-webkit-scrollbar-thumb:hover { background:var(--muted); }
*::-webkit-scrollbar-track { background:transparent; }

/* Focus */
:focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }
button:focus:not(:focus-visible) { outline:none; }
.sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }

/* ---------- Layout shell (Option A) ---------- */
.app {
  display:grid; grid-template-columns:228px 1fr; grid-template-rows:auto 1fr;
  grid-template-areas:"head head" "nav main"; height:100vh; overflow:hidden;
}
.icon { width:16px; height:16px; flex:none; stroke:currentColor; stroke-width:1.8;
  stroke-linecap:round; stroke-linejoin:round; fill:none; }
.icon.sm { width:13px; height:13px; }
.icon.lg { width:20px; height:20px; }

/* ---------- Header ---------- */
header {
  grid-area:head; display:flex; align-items:center; gap:16px; padding:0 18px;
  height:54px; background:linear-gradient(180deg, var(--surface), var(--bg));
  border-bottom:1px solid var(--border); position:relative; z-index:20;
}
.brand { display:flex; align-items:center; gap:11px; }
.logo {
  width:30px; height:30px; border-radius:9px; display:grid; place-items:center;
  background:linear-gradient(145deg, var(--accent), var(--accent2));
  box-shadow:var(--sh-glow); color:#fff;
}
.logo .icon { width:18px; height:18px; stroke-width:2; }
.brand .name { font-weight:800; font-size:15px; letter-spacing:-.01em; }
.brand .name .recall { color:var(--accent2); }
.served-hint {
  display:inline-flex; align-items:center; gap:6px; font-family:var(--mono);
  font-size:10.5px; color:var(--muted); padding:3px 9px; border:1px solid var(--border);
  border-radius:var(--r-pill); background:var(--surface2);
}
.served-hint .dot { width:6px; height:6px; border-radius:50%; background:var(--success);
  box-shadow:0 0 0 3px var(--success-soft); animation:pulse 2.4s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }

.head-spacer { flex:1; }
.head-search {
  display:flex; align-items:center; gap:8px; background:var(--surface2);
  border:1px solid var(--border); border-radius:var(--r-pill); padding:6px 12px;
  width:240px; transition:border-color .15s, box-shadow .15s;
}
.head-search:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
.head-search input { background:none; border:none; outline:none; color:var(--text); font-size:12.5px; width:100%; }
.head-search input::placeholder { color:var(--muted); }
.head-search kbd { font-family:var(--mono); font-size:10px; color:var(--muted);
  border:1px solid var(--border); border-radius:4px; padding:1px 5px; background:var(--bg); }

.icon-btn {
  width:34px; height:34px; border-radius:9px; border:1px solid var(--border);
  background:var(--surface2); display:grid; place-items:center; cursor:pointer;
  transition:background .15s, border-color .15s, transform .1s; color:var(--muted);
}
.icon-btn:hover { background:var(--surface); color:var(--text); border-color:var(--muted); }
.icon-btn:active { transform:scale(.94); }
.live-toggle { display:inline-flex; align-items:center; gap:7px; font-size:11.5px;
  color:var(--muted); border:1px solid var(--border); background:var(--surface2);
  border-radius:var(--r-pill); padding:6px 11px 6px 9px; cursor:pointer; }
.live-toggle .dot { width:7px; height:7px; border-radius:50%; background:var(--success); animation:pulse 1.6s infinite; }
.live-toggle.paused .dot { background:var(--muted); animation:none; }

/* ---------- Left nav ---------- */
nav {
  grid-area:nav; background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:14px 12px; overflow-y:auto; gap:3px;
}
.nav-section { font-size:10px; text-transform:uppercase; letter-spacing:.09em;
  color:var(--muted); font-weight:700; padding:14px 10px 6px; }
.nav-item {
  display:flex; align-items:center; gap:11px; padding:8px 11px; border-radius:9px;
  color:var(--muted); cursor:pointer; border:1px solid transparent; font-weight:500;
  font-size:13px; position:relative; transition:background .14s, color .14s; width:100%;
  text-align:left; background:none;
}
.nav-item:hover { background:var(--surface2); color:var(--text); }
.nav-item.active { background:var(--accent-soft); color:var(--text); border-color:var(--accent-line); }
.nav-item.active::before { content:""; position:absolute; left:-12px; top:9px; bottom:9px;
  width:3px; border-radius:3px; background:var(--accent); }
.nav-item .icon { color:inherit; }
.nav-item .badge {
  margin-left:auto; font-size:10.5px; font-family:var(--mono); font-weight:700;
  background:var(--surface2); color:var(--muted); border-radius:var(--r-pill);
  padding:1px 7px; min-width:20px; text-align:center; border:1px solid var(--border);
}
.nav-item.active .badge { background:var(--accent); color:#fff; border-color:transparent; }
.nav-item .badge.warn { background:var(--warn-soft); color:var(--warn); border-color:transparent; }
.nav-item .badge.danger { background:var(--danger-soft); color:var(--danger); border-color:transparent; }

.nav-foot { margin-top:auto; padding:12px 8px 2px; border-top:1px solid var(--border); }
.nav-foot .who { display:flex; align-items:center; gap:9px; padding:6px 4px; }
.avatar { width:28px; height:28px; border-radius:8px; background:linear-gradient(145deg,var(--accent2),var(--accent));
  display:grid; place-items:center; color:#fff; font-weight:700; font-size:12px; }
.nav-foot .who .meta { line-height:1.25; }
.nav-foot .who .meta b { font-size:12px; }
.nav-foot .who .meta span { font-size:10.5px; color:var(--muted); }

/* ---------- Main ---------- */
main { grid-area:main; overflow-y:auto; padding:18px 20px 40px; position:relative; }
.view { display:none; animation:fade .2s ease; }
.view.active { display:block; }
@keyframes fade { from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }

.view-head { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:16px; gap:16px; flex-wrap:wrap; }
.view-head h1 { font-size:21px; font-weight:700; margin:0; letter-spacing:-.015em; }
.view-head .sub { color:var(--muted); font-size:12.5px; margin-top:3px; max-width:760px; }
.view-head .actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

/* ---------- KPI strip ---------- */
.kpi-strip { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:16px; }
.kpi {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg);
  padding:13px 15px; position:relative; overflow:hidden; box-shadow:var(--sh-sm);
}
.kpi .label { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px; font-weight:500; }
.kpi .label .icon { width:13px; height:13px; opacity:.8; }
.kpi .val { font-size:23px; font-weight:800; letter-spacing:-.02em; margin-top:7px; line-height:1; font-variant-numeric:tabular-nums; }
.kpi .val .unit { font-size:13px; font-weight:600; color:var(--muted); margin-left:2px; }
.kpi .delta { font-size:11px; font-weight:600; margin-top:6px; display:inline-flex; align-items:center; gap:4px; }
.kpi .delta.up { color:var(--success); }
.kpi .delta.down { color:var(--danger); }
.kpi .delta.flat { color:var(--muted); }
.kpi .spark { position:absolute; right:10px; top:12px; opacity:.9; }
.kpi.feature { background:linear-gradient(150deg, color-mix(in srgb, var(--accent) 14%, var(--surface)), var(--surface)); border-color:color-mix(in srgb, var(--accent) 30%, var(--border)); }

/* ---------- Grid panels ---------- */
.grid-2 { display:grid; grid-template-columns:1.55fr 1fr; gap:12px; margin-bottom:14px; }
.grid-overview { display:grid; grid-template-columns:1fr 340px; gap:14px; align-items:start; }
.card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg);
  box-shadow:var(--sh-sm);
}
.card-head { display:flex; align-items:center; gap:10px; padding:13px 15px; border-bottom:1px solid var(--border); }
.card-head h3 { margin:0; font-size:13.5px; font-weight:700; letter-spacing:-.01em; display:flex; align-items:center; gap:8px; }
.card-head h3 .icon { color:var(--accent2); }
.card-head .sub { font-size:11px; color:var(--muted); }
.card-head .spacer { flex:1; }
.card-body { padding:14px 15px; }
.card-body.flush { padding:0; }

/* segmented control */
.seg { display:inline-flex; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-pill); padding:2px; gap:2px; }
.seg button { border:none; background:none; cursor:pointer; font-size:11.5px; font-weight:600; color:var(--muted);
  padding:4px 11px; border-radius:var(--r-pill); transition:background .14s, color .14s; }
.seg button.on { background:var(--surface); color:var(--text); box-shadow:var(--sh-sm); }

.btn { display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:600;
  padding:7px 13px; border-radius:9px; border:1px solid var(--border); background:var(--surface2);
  color:var(--text); cursor:pointer; transition:background .14s, border-color .14s, transform .08s; }
.btn:hover { background:var(--surface); border-color:var(--muted); }
.btn:active { transform:scale(.97); }
.btn .icon { width:14px; height:14px; }
.btn.primary { background:var(--accent); border-color:transparent; color:#fff; }
.btn.primary:hover { background:color-mix(in srgb, var(--accent) 88%, #fff); }
.btn.success { background:var(--success); border-color:transparent; color:#06231a; }
.btn.success:hover { filter:brightness(1.06); }
.btn.warn { background:var(--warn); border-color:transparent; color:#2a1c00; }
.btn.warn:hover { filter:brightness(1.06); }
.btn.danger { background:var(--danger-soft); border-color:color-mix(in srgb, var(--danger) 40%, transparent); color:var(--danger); }
.btn.ghost { background:none; }
.btn.sm { padding:5px 10px; font-size:11.5px; }
.btn[disabled] { opacity:.45; cursor:not-allowed; }

/* ---------- Charts ---------- */
.chart-wrap { position:relative; }
.chart-tip { position:absolute; pointer-events:none; background:var(--surface2);
  border:1px solid var(--border); border-radius:8px; padding:7px 10px; font-size:11px;
  box-shadow:var(--sh-md); opacity:0; transition:opacity .1s; transform:translate(-50%,-115%); white-space:nowrap; z-index:5; }
.chart-tip b { font-family:var(--mono); }
.chart-legend { display:flex; gap:16px; flex-wrap:wrap; padding:0 15px 13px; }
.leg { display:inline-flex; align-items:center; gap:6px; font-size:11.5px; color:var(--muted); }
.leg .sw { width:10px; height:10px; border-radius:3px; }

/* ---------- Tier legend ---------- */
.tier-legend .row { display:flex; align-items:center; gap:9px; font-size:12px; }
.tier-legend .sw { width:11px; height:11px; border-radius:3px; flex:none; }
.tier-legend .nm { flex:1; }
.tier-legend .pct { color:var(--muted); font-size:11px; font-family:var(--mono); min-width:42px; text-align:right; }

/* ---------- Leaderboard table ---------- */
.lb-toolbar { display:flex; align-items:center; gap:10px; padding:11px 15px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
.filterbox { display:flex; align-items:center; gap:7px; background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; padding:6px 10px; flex:1; min-width:170px; }
.filterbox input { background:none; border:none; outline:none; color:var(--text); font-size:12px; width:100%; }
.filterbox input::placeholder { color:var(--muted); }
.chipset { display:flex; gap:6px; flex-wrap:wrap; }
.chip { font-size:11px; font-weight:600; padding:5px 10px; border-radius:var(--r-pill);
  border:1px solid var(--border); background:var(--surface2); color:var(--muted); cursor:pointer; transition:all .14s; }
.chip:hover { color:var(--text); }
.chip.on { background:var(--accent-soft); color:var(--text); border-color:var(--accent-line); }

table { width:100%; border-collapse:collapse; }
thead th { text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.06em;
  color:var(--muted); font-weight:700; padding:9px 14px; border-bottom:1px solid var(--border);
  position:sticky; top:0; background:var(--surface); z-index:2; white-space:nowrap; }
thead th.sortable { cursor:pointer; user-select:none; }
thead th.sortable:hover { color:var(--text); }
thead th .sort-ind { display:inline-block; width:9px; margin-left:3px; color:var(--accent); }
thead th.num, td.num { text-align:right; font-variant-numeric:tabular-nums; }
tbody tr { cursor:pointer; transition:background .12s; }
tbody tr:hover { background:var(--surface2); }
tbody tr.sel { background:var(--accent-soft); }
tbody tr.sel td:first-child { box-shadow:inset 3px 0 0 var(--accent); }
tbody td { padding:11px 14px; border-bottom:1px solid color-mix(in srgb, var(--border) 60%, transparent); font-size:12.5px; vertical-align:middle; }
tbody tr:last-child td { border-bottom:none; }
.prompt-cell { display:flex; flex-direction:column; gap:2px; max-width:330px; }
.prompt-cell .norm { font-weight:600; font-size:12.5px; }
.prompt-cell .ex { font-size:11px; color:var(--muted); font-family:var(--mono); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.hot { font-family:var(--mono); font-weight:700; font-size:13px; }
.hotscore-cell { display:flex; align-items:center; gap:8px; justify-content:flex-end; }
.hs-bar { width:54px; height:6px; background:var(--surface2); border-radius:99px; overflow:hidden; flex:none; }
.hs-bar > i { display:block; height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:99px; }
.minibar { height:5px; border-radius:3px; background:var(--surface2); overflow:hidden; margin-top:5px; }
.minibar > span { display:block; height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }

/* badges — A's .badge2 .b-* superset (covers every closed-set enum) */
.badge2 { display:inline-flex; align-items:center; gap:5px; font-size:10.5px; font-weight:700;
  padding:3px 9px; border-radius:var(--r-pill); border:1px solid transparent; white-space:nowrap; letter-spacing:.01em; }
.b-yes,.b-trusted,.b-automated,.b-fresh { background:var(--success-soft); color:var(--success); }
.b-gated,.b-validating,.b-awaiting { background:var(--warn-soft); color:var(--warn); }
.b-no,.b-rejected,.b-stale,.b-drifted,.b-danger { background:var(--danger-soft); color:var(--danger); }
.b-unknown,.b-candidate,.b-not_promoted,.b-muted { background:var(--surface2); color:var(--muted); border-color:var(--border); }
.b-accent { background:var(--accent-soft); color:var(--accent2); }
.dotmark { width:6px; height:6px; border-radius:50%; background:currentColor; }

/* ---------- Right rail (detail) ---------- */
.rail { position:sticky; top:0; display:flex; flex-direction:column; gap:12px; max-height:calc(100vh - 92px); overflow-y:auto; padding-bottom:8px; }
.rail-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); box-shadow:var(--sh-md); overflow:hidden; }
.rail-empty { display:grid; place-items:center; text-align:center; padding:40px 22px; color:var(--muted); }
.rail-empty .icon { width:36px; height:36px; opacity:.4; margin-bottom:12px; }
.rail-empty b { color:var(--text); display:block; font-size:13.5px; margin-bottom:4px; }
.rail-hd { padding:14px 15px 12px; border-bottom:1px solid var(--border); background:linear-gradient(180deg, var(--surface2), var(--surface)); }
.rail-hd .kicker { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:700; }
.rail-hd h3 { margin:6px 0 0; font-size:16px; font-weight:700; letter-spacing:-.01em; }
.rail-hd .exline { font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:6px; }
.rail-badges { display:flex; gap:6px; flex-wrap:wrap; margin-top:11px; }
.rail-sec { padding:13px 15px; border-bottom:1px solid var(--border); }
.rail-sec:last-child { border-bottom:none; }
.rail-sec h4 { margin:0 0 10px; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:700; display:flex; align-items:center; gap:7px; }
.rail-sec h4 .icon { color:var(--accent2); }
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stat { background:var(--surface2); border:1px solid var(--border); border-radius:9px; padding:9px 11px; }
.stat .k { font-size:10.5px; color:var(--muted); }
.stat .v { font-size:16px; font-weight:800; margin-top:3px; font-variant-numeric:tabular-nums; }
.stat .v.mono { font-family:var(--mono); font-size:14px; }

/* verdict block + 3-axis grid (C's verdict copy) */
.verdict { display:flex; align-items:flex-start; gap:11px; padding:12px; border-radius:11px; border:1px solid var(--border); background:var(--surface2); }
.verdict .vico { width:34px; height:34px; border-radius:9px; display:grid; place-items:center; flex:none; }
.verdict.yes .vico { background:var(--success-soft); color:var(--success); }
.verdict.gated .vico { background:var(--warn-soft); color:var(--warn); }
.verdict.no .vico { background:var(--danger-soft); color:var(--danger); }
.verdict.unknown .vico { background:var(--surface); color:var(--muted); }
.verdict .vtxt b { font-size:13px; }
.verdict .vtxt p { margin:3px 0 0; font-size:11.5px; color:var(--muted); line-height:1.45; }
.hp-rule { display:flex; align-items:center; gap:9px; padding:11px 13px; border-radius:var(--r-md); background:var(--accent-soft); border:1px solid var(--accent-line); font-size:12px; }
.hp-rule .icon { stroke:var(--accent); flex:none; width:16px; height:16px; }
.verdict-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:11px; }
.vg-item { background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-md); padding:10px 12px; }

.vg-item .vv { font-size:17px; font-weight:800; margin-top:2px; }

/* artifact code (rail-scoped, A) */
.artifact { background:var(--bg); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.artifact .afh { display:flex; align-items:center; gap:8px; padding:8px 11px; border-bottom:1px solid var(--border); background:var(--surface2); font-size:11px; }

.artifact .afh .lang { margin-left:auto; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }

/* staleness chips (rail) */
.sig-list { display:flex; flex-direction:column; gap:8px; }
.sig { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:9px; border:1px solid var(--border); background:var(--surface2); }
.sig .sdot { width:8px; height:8px; border-radius:50%; flex:none; }
.sig.fresh .sdot { background:var(--success); box-shadow:0 0 0 3px var(--success-soft); }
.sig.stale .sdot { background:var(--danger); box-shadow:0 0 0 3px var(--danger-soft); }
.sig .sk { font-weight:700; font-size:11.5px; text-transform:capitalize; }
.sig .sd { font-size:10.5px; color:var(--muted); margin-top:1px; }
.sig .strat { margin-left:auto; font-family:var(--mono); font-size:9.5px; color:var(--muted); border:1px solid var(--border); border-radius:5px; padding:1px 5px; background:var(--bg); }

.context-kv { display:grid; grid-template-columns:auto 1fr; gap:6px 14px; font-size:11.5px; }
.context-kv .k { color:var(--muted); font-family:var(--mono); font-size:10.5px; }
.context-kv .v { font-weight:600; font-family:var(--mono); word-break:break-all; }
.reflist { display:flex; flex-direction:column; gap:5px; margin-top:9px; }
.reflist .rf { font-family:var(--mono); font-size:10.5px; color:var(--muted); display:flex; align-items:center; gap:7px; }

/* ---------- Event feed ---------- */
.feed { display:flex; flex-direction:column; }
.evt { display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center; padding:9px 14px;
  border-bottom:1px solid color-mix(in srgb,var(--border) 55%,transparent); font-size:12px; animation:slidein .35s ease; }
@keyframes slidein { from{opacity:0; transform:translateX(-8px);} to{opacity:1; transform:none;} }
.evt:last-child { border-bottom:none; }
.evt .tier-pill { width:9px; height:9px; border-radius:50%; }
.evt .ebody { min-width:0; }
.evt .ebody .ep { font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.evt .ebody .em { font-size:10.5px; color:var(--muted); display:flex; gap:8px; align-items:center; font-family:var(--mono); margin-top:1px; }
.evt .eright { text-align:right; font-family:var(--mono); }
.evt .eright .tk { font-weight:700; font-size:12px; }
.evt .eright .lt { font-size:10px; color:var(--muted); }
.conn { display:inline-flex; align-items:center; gap:4px; font-size:10px; padding:1px 6px; border-radius:var(--r-pill); border:1px solid var(--border); }
.conn.claude { color:var(--c1); border-color:color-mix(in srgb,var(--c1) 40%,transparent); }
.conn.codex { color:var(--c3); border-color:color-mix(in srgb,var(--c3) 40%,transparent); }
.conn.cowork { color:var(--c2); border-color:color-mix(in srgb,var(--c2) 40%,transparent); }
/* C's served-by badges (clearer than A's tier dot) */
.served { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; padding:2px 8px; border-radius:var(--r-pill); }
.served.automation { color:var(--success); background:var(--success-soft); }
.served.exact { color:var(--c3); background:color-mix(in srgb,var(--c3) 16%,transparent); }
.served.semantic { color:var(--accent2); background:var(--accent-soft); }
.served.live { color:var(--warn); background:var(--warn-soft); }

/* ============================================================
   LIFECYCLE PIPELINE (Option C)
   ============================================================ */
.lc-flow { display:flex; align-items:stretch; }
.lc-stage {
  position:relative; padding:14px 16px; min-width:0; flex:1; border:none; text-align:left;
  border-right:1px solid var(--border); background:transparent; transition:background .15s;
}
.lc-stage:last-of-type { border-right:none; }
.lc-stage.is-target { background:var(--accent-soft); }
.lc-stage:hover { background:var(--surface2); }
.lc-arrow { width:26px; display:grid; place-items:center; flex:none; }
.lc-arrow .icon { color:var(--muted); }
.lc-name { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); display:flex; align-items:center; gap:7px; }
.lc-name .dot { width:8px; height:8px; border-radius:99px; }
.lc-count { font-size:30px; font-weight:800; letter-spacing:-.02em; margin-top:4px; font-variant-numeric:tabular-nums; }
.lc-desc { font-size:11.5px; color:var(--muted); margin-top:2px; }
.stale-strip { display:flex; align-items:center; gap:10px; padding:10px 16px; border-top:1px solid var(--border); background:var(--warn-soft); color:var(--text); font-size:12px; }
.stale-strip .icon { stroke:var(--warn); flex:none; }

/* ============================================================
   AUTOMATIONS / COWORK CANVAS (Option C)
   ============================================================ */
.canvas-layout { display:grid; gap:12px; grid-template-columns:268px 1fr; align-items:start; }
.auto-list { display:flex; flex-direction:column; overflow:hidden; }
.auto-list-head { padding:12px 13px; border-bottom:1px solid var(--border); }
.auto-list-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); display:flex; align-items:center; justify-content:space-between; }
.search-box { margin-top:10px; display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-md); padding:7px 10px; }
.search-box .icon { color:var(--muted); flex:none; }

.search-box input::placeholder { color:var(--muted); }
.filter-chips { display:flex; flex-wrap:wrap; gap:5px; margin-top:9px; }
.auto-items { max-height:calc(100vh - 280px); overflow-y:auto; padding:6px; }
.auto-item {
  width:100%; text-align:left; border:1px solid transparent; background:transparent;
  border-radius:var(--r-md); padding:10px 11px; display:flex; flex-direction:column; gap:5px;
  transition:background .12s, border-color .12s;
}
.auto-item:hover { background:var(--surface2); }
.auto-item.sel { background:var(--accent-soft); border-color:var(--accent-line); }
.auto-item-top { display:flex; align-items:center; gap:8px; }
.auto-item-title { font-size:12.5px; font-weight:700; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.auto-item-sub { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--muted); flex-wrap:wrap; }
.kind-ico { width:22px; height:22px; border-radius:6px; display:grid; place-items:center; flex:none; background:var(--surface2); border:1px solid var(--border); color:var(--accent2); }
.kind-ico .icon { width:13px; height:13px; }

/* detail (cowork three-pane) */
.detail { display:flex; flex-direction:column; gap:12px; min-width:0; }
.detail-head { display:flex; align-items:flex-start; gap:14px; padding:15px 17px; }
.detail-head .kind-ico { width:38px; height:38px; border-radius:10px; }
.detail-head .kind-ico .icon { width:19px; height:19px; }
.detail-title { font-size:18px; font-weight:800; letter-spacing:-.01em; }
.detail-slug { font-family:var(--mono); font-size:11.5px; color:var(--muted); margin-top:2px; }
.detail-meta { display:flex; flex-wrap:wrap; gap:7px; margin-top:9px; }
.meta-pill { display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); background:var(--surface2); border:1px solid var(--border); padding:3px 9px; border-radius:var(--r-pill); }
.meta-pill b { color:var(--text); font-weight:700; }
.meta-pill .icon { width:12px; height:12px; }
.detail-actions { margin-left:auto; display:flex; gap:8px; flex:none; flex-wrap:wrap; justify-content:flex-end; }

.threepane { display:grid; gap:12px; grid-template-columns:1.05fr 1.25fr 1fr; align-items:start; }
.pane { display:flex; flex-direction:column; min-width:0; }
.pane-head { display:flex; align-items:center; gap:9px; padding:11px 14px; border-bottom:1px solid var(--border);
  font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
.pane-head .icon { color:var(--accent2); width:15px; height:15px; }
.pane-head .count { margin-left:auto; font-family:var(--mono); color:var(--text); font-size:11px; background:var(--surface2); border:1px solid var(--border); padding:1px 7px; border-radius:var(--r-pill); }
.pane-body { padding:13px 14px; }

/* progress / workflow timeline */
.timeline { position:relative; padding-left:4px; }
.tl-step { position:relative; padding:0 0 16px 30px; }
.tl-step:last-child { padding-bottom:0; }
.tl-step::before { content:""; position:absolute; left:9px; top:20px; bottom:-2px; width:2px; background:var(--border); }
.tl-step:last-child::before { display:none; }
.tl-node { position:absolute; left:0; top:1px; width:20px; height:20px; border-radius:99px;
  display:grid; place-items:center; background:var(--surface2); border:2px solid var(--border); z-index:1; }
.tl-node .icon { width:11px; height:11px; stroke:var(--muted); }
.tl-step.done .tl-node { background:var(--success); border-color:var(--success); }
.tl-step.done .tl-node .icon { stroke:#06231a; }
.tl-step.active .tl-node { background:var(--accent); border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-soft); }
.tl-step.active .tl-node .icon { stroke:#fff; }
.tl-step.gate .tl-node { background:var(--warn); border-color:var(--warn); }
.tl-step.gate .tl-node .icon { stroke:#2a1c00; }
.tl-name { font-size:12.5px; font-weight:700; }
.tl-sub { font-size:11px; color:var(--muted); margin-top:1px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.tag { font-family:var(--mono); font-size:10px; color:var(--muted); background:var(--surface2); border:1px solid var(--border); padding:0 6px; border-radius:5px; }
.tag.irr { color:var(--danger); border-color:color-mix(in srgb,var(--danger) 30%,transparent); background:var(--danger-soft); }

/* working folder / artifact (three-pane) */
.file-tab { display:flex; align-items:center; gap:8px; padding:8px 11px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-md) var(--r-md) 0 0; border-bottom:none; }
.file-tab .icon { color:var(--accent2); width:14px; height:14px; }
.file-tab .fname { font-family:var(--mono); font-size:11.5px; font-weight:700; }
.file-tab .lang { margin-left:auto; font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); background:var(--surface); border:1px solid var(--border); padding:1px 7px; border-radius:var(--r-pill); }
.code { margin:0; background:var(--bg); border:1px solid var(--border); border-radius:0 0 var(--r-md) var(--r-md);
  padding:12px 0; overflow-x:auto; font-family:var(--mono); font-size:11.5px; line-height:1.65; }
.code .ln { display:flex; }
.code .gut { width:38px; flex:none; text-align:right; padding-right:12px; color:var(--muted); opacity:.55; user-select:none; }
.code .src { white-space:pre; padding-right:16px; }
.tok-kw { color:var(--accent2); }
.tok-str { color:var(--success); }
.tok-com { color:var(--muted); font-style:italic; }
.tok-fn { color:var(--c3); }
.tok-num { color:var(--warn); }
.artifact-foot { display:flex; gap:10px; margin-top:10px; }
.stat-mini { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-md); padding:8px 10px; }
.stat-mini .lbl { font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
.stat-mini .v { font-size:16px; font-weight:800; margin-top:2px; }
.stat-mini .v .u { font-size:11px; color:var(--muted); font-weight:600; }

/* context / memory */
.ctx-section + .ctx-section { margin-top:14px; }
.ctx-label { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); display:flex; align-items:center; gap:7px; margin-bottom:8px; }
.ctx-label .icon { color:var(--muted); width:13px; height:13px; }
.kv { display:flex; justify-content:space-between; gap:10px; padding:5px 0; border-bottom:1px dashed var(--border); font-size:12px; }
.kv:last-child { border-bottom:none; }
.kv .k { color:var(--muted); font-family:var(--mono); font-size:11.5px; }
.kv .val { font-weight:600; text-align:right; word-break:break-word; }
.file-ref { display:flex; align-items:center; gap:7px; padding:5px 8px; border-radius:6px; font-family:var(--mono); font-size:11px; }
.file-ref:hover { background:var(--surface2); }
.file-ref .icon { color:var(--c3); width:13px; height:13px; flex:none; }
.pill-list { display:flex; flex-wrap:wrap; gap:6px; justify-content:flex-end; }
.val-pill { font-family:var(--mono); font-size:11px; background:var(--surface2); border:1px solid var(--border); padding:2px 8px; border-radius:var(--r-pill); }

/* staleness signal rows (three-pane + view) */
.stale-grid { display:grid; gap:8px; margin-top:8px; }
.signal { display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:var(--r-md); border:1px solid var(--border); background:var(--surface2); }
.signal .sig-ico { width:26px; height:26px; border-radius:7px; display:grid; place-items:center; flex:none; }
.signal .sig-ico .icon { width:14px; height:14px; }
.signal.fresh .sig-ico { background:var(--success-soft); } .signal.fresh .sig-ico .icon { stroke:var(--success); }
.signal.drift .sig-ico { background:var(--danger-soft); } .signal.drift .sig-ico .icon { stroke:var(--danger); }
.signal .sig-body { min-width:0; flex:1; }
.signal .sig-type { font-size:12px; font-weight:700; display:flex; align-items:center; gap:8px; text-transform:capitalize; }
.signal .sig-detail { font-size:11px; color:var(--muted); margin-top:1px; }
.signal .sig-state { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding:2px 7px; border-radius:var(--r-pill); flex:none; }
.signal.fresh .sig-state { color:var(--success); background:var(--success-soft); }
.signal.drift .sig-state { color:var(--danger); background:var(--danger-soft); }

/* ============================================================
   APPROVALS (Option C, queue-first)
   ============================================================ */
.approval-layout { display:grid; gap:12px; grid-template-columns:1.3fr 1fr; align-items:start; }
.approval-banner { display:flex; align-items:center; gap:13px; padding:14px 17px; border-radius:var(--r-lg);
  background:linear-gradient(100deg, var(--warn-soft), transparent 70%); border:1px solid color-mix(in srgb,var(--warn) 30%,transparent); margin-bottom:12px; }
.approval-banner .ab-ico { width:40px; height:40px; border-radius:11px; display:grid; place-items:center; background:var(--warn-soft); flex:none; color:var(--warn); }
.approval-banner .ab-ico .icon { width:21px; height:21px; }
.approval-banner h2 { margin:0; font-size:15px; }
.approval-banner p { margin:2px 0 0; font-size:12px; color:var(--muted); max-width:640px; }
.ab-count { margin-left:auto; text-align:right; flex:none; }
.ab-count .n { font-size:30px; font-weight:800; color:var(--warn); line-height:1; }
.ab-count .l { font-size:11px; color:var(--muted); }

.approval-card { overflow:hidden; margin-bottom:12px; }
.approval-card.resolved { opacity:.62; }
.ac-head { display:flex; align-items:center; gap:11px; padding:13px 15px; border-bottom:1px solid var(--border); }
.ac-id { font-family:var(--mono); font-size:11px; color:var(--muted); }
.ac-title { font-weight:700; font-size:13.5px; }
.ac-body { padding:13px 15px; display:grid; gap:12px; grid-template-columns:1fr 1fr; }
.ac-block .ac-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:6px; }
.param-row { display:flex; justify-content:space-between; gap:10px; padding:5px 9px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; font-family:var(--mono); font-size:11.5px; margin-bottom:5px; }
.param-row .pk { color:var(--muted); }
.blast { font-size:12px; color:var(--text); background:var(--danger-soft); border:1px solid color-mix(in srgb,var(--danger) 25%,transparent); border-radius:var(--r-md); padding:10px 12px; line-height:1.55; }
.blast .blast-head { display:flex; align-items:center; gap:7px; font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--danger); margin-bottom:5px; }
.blast .blast-head .icon { stroke:var(--danger); width:13px; height:13px; }
.ac-foot { display:flex; align-items:center; gap:8px; padding:12px 15px; border-top:1px solid var(--border); background:var(--surface2); flex-wrap:wrap; }
.ac-foot .req { font-size:11.5px; color:var(--muted); margin-right:auto; }
.resolved-tag { font-size:10.5px; font-weight:700; padding:3px 10px; border-radius:var(--r-pill); text-transform:uppercase; letter-spacing:.03em; }
.resolved-tag.approved { color:var(--success); background:var(--success-soft); }
.resolved-tag.rejected { color:var(--danger); background:var(--danger-soft); }
.resolved-tag.ran { color:var(--accent2); background:var(--accent-soft); }
.appr-log-row { display:flex; align-items:center; gap:9px; font-size:12px; }

/* staleness view rows (Option A) */
.stale-row { display:grid; grid-template-columns:1fr auto; gap:14px; padding:15px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--r-lg); box-shadow:var(--sh-sm); margin-bottom:12px; }
.stale-row.drift { border-color:color-mix(in srgb,var(--danger) 40%,var(--border)); }
.stale-row .lhs h3 { margin:0; font-size:14px; font-weight:700; }
.stale-row .lhs .slug { font-family:var(--mono); font-size:10.5px; color:var(--muted); margin:2px 0 12px; }
.stale-sigs { display:flex; gap:8px; flex-wrap:wrap; }
.ssig { display:flex; align-items:center; gap:7px; padding:6px 10px; border-radius:9px; border:1px solid var(--border); background:var(--surface2); font-size:11px; }
.ssig .sd2 { width:7px; height:7px; border-radius:50%; }
.ssig.fresh .sd2 { background:var(--success); }
.ssig.stale .sd2 { background:var(--danger); }
.stale-row .rhs { display:flex; flex-direction:column; align-items:flex-end; gap:9px; min-width:150px; }

.empty-note { text-align:center; color:var(--muted); padding:30px; font-size:12.5px; }

/* toast */
.toast-wrap { position:fixed; bottom:18px; right:18px; display:flex; flex-direction:column; gap:8px; z-index:100; }
.toast { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:11px; padding:11px 14px; box-shadow:var(--sh-lg);
  display:flex; align-items:center; gap:10px; font-size:12.5px; animation:toastin .25s ease; max-width:340px; }
.toast .tic { width:26px; height:26px; border-radius:7px; display:grid; place-items:center; flex:none; }
.toast.ok { border-left-color:var(--success); } .toast.ok .tic { background:var(--success-soft); color:var(--success); }
.toast.info { border-left-color:var(--accent); } .toast.info .tic { background:var(--accent-soft); color:var(--accent2); }
.toast.warn { border-left-color:var(--warn); } .toast.warn .tic { background:var(--warn-soft); color:var(--warn); }
.toast.danger { border-left-color:var(--danger); } .toast.danger .tic { background:var(--danger-soft); color:var(--danger); }
.toast .t-msg { font-weight:600; }
.toast .t-sub { font-size:11px; color:var(--muted); margin-top:1px; }
@keyframes toastin { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }

/* ---------- responsive ---------- */
@media (max-width:1320px){ .threepane { grid-template-columns:1fr 1fr; } }
@media (max-width:1180px){
  .kpi-strip { grid-template-columns:repeat(3,1fr); }
  .grid-overview { grid-template-columns:1fr; }
  .rail { position:static; max-height:none; }
  .approval-layout { grid-template-columns:1fr; }
}
@media (max-width:1080px){ .canvas-layout { grid-template-columns:1fr; } }
@media (max-width:880px){ .threepane { grid-template-columns:1fr; } .ac-body { grid-template-columns:1fr; } }
@media (max-width:760px){
  .app { grid-template-columns:1fr; grid-template-areas:"head" "main"; }
  nav { display:none; }
  .kpi-strip { grid-template-columns:repeat(2,1fr); }
  .grid-2 { grid-template-columns:1fr; }
}

<div class="app">
  <!-- ============ HEADER (Option A chrome) ============ -->

/* formatters (pure) */
function fmt(n){ return n.toLocaleString('en-US'); }
function fmtShort(n){
  if(n>=1e9) return (n/1e9).toFixed(2)+'B';
  if(n>=1e6) return (n/1e6).toFixed(2)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'k';
  return ''+n;
}
function pct(n,d){ return (n*100).toFixed(d===undefined?1:d)+'%'; }
function timeAgo(iso){
  const d = (Date.parse("2026-06-30T09:42:00Z") - Date.parse(iso))/1000;
  if(d<60) return Math.max(1,Math.round(d))+'s ago';
  if(d<3600) return Math.round(d/60)+'m ago';
  if(d<86400) return Math.round(d/3600)+'h ago';
  return Math.round(d/86400)+'d ago';
}
function clockOf(iso){ return iso.slice(11,19); }
function esc(s){ return (s+'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function highlight(line, lang){
  let s = esc(line);
  if(lang==='python'||lang==='bash'){ s = s.replace(/(#.*)$/g,'<span class="tok-com">$1</span>'); }
  else { s = s.replace(/(\/\/.*)$/g,'<span class="tok-com">$1</span>'); }
  s = s.replace(/(&#39;[^&]*?&#39;|&quot;[^&]*?&quot;)/g,'<span class="tok-str">$1</span>');
  const kw = lang==='python'
    ? ['def','return','for','in','if','not','lambda','import','async','await']
    : lang==='bash' ? ['set','for','do','done','exit','echo']
    : ['export','async','function','const','let','await','return','if'];
  kw.forEach(k=>{ s = s.replace(new RegExp('\\b('+k+')\\b','g'),'<span class="tok-kw">$1</span>'); });
  s = s.replace(/\b(\d+)\b/g,'<span class="tok-num">$1</span>');
  return s;
}
function autoBySlug(s){ return DATA.automations.find(a=>a.slug===s); }
function autoById(id){ return DATA.automations.find(a=>a.id===id); }
function compressionOf(a){ return (a.baselineTokensPerRun/a.replayTokensPerRun).toFixed(0); }

/* ---- charts (hand-rolled inline SVG) ---- */
function sparkline(arr, w, h, color, fillId){
  const min=Math.min(...arr), max=Math.max(...arr), rng=(max-min)||1;
  const step=w/(arr.length-1);
  const pts=arr.map((v,i)=>[i*step, h-((v-min)/rng)*(h-3)-1.5]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=`M0 ${h} `+pts.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L${w} ${h} Z`;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="${fillId}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${color}" stop-opacity=".35"/><stop offset="1" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${fillId})"/>
    <path d="${d}" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}
function bigChart(){
  const W=620,H=240,padL=46,padR=14,padT=14,padB=26;
  const days=DATA.series.days;
  const isTok = state.chartMetric==='tokens';
  const arr = isTok?DATA.series.tokensSaved:DATA.series.hitRate;
  const max = isTok?Math.max(...arr)*1.08 : 0.8;
  const min = 0;
  const iw=W-padL-padR, ih=H-padT-padB;
  const x=i=>padL+ (i/(days.length-1))*iw;
  const y=v=>padT+ ih-((v-min)/(max-min))*ih;
  let grid='', labels='';
  const ticks=isTok?5:4;
  for(let t=0;t<=ticks;t++){
    const val=min+(max-min)*t/ticks;
    const yy=y(val);
    grid+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="var(--grid)" stroke-width="1"/>`;
    labels+=`<text x="${padL-8}" y="${(yy+3).toFixed(1)}" text-anchor="end" font-size="9.5" fill="var(--muted)" font-family="var(--mono)">${isTok?fmtShort(val):(val*100).toFixed(0)+'%'}</text>`;
  }
  let xlab='';
  days.forEach((d,i)=>{ if(i%5===0||i===days.length-1){ xlab+=`<text x="${x(i).toFixed(1)}" y="${H-7}" text-anchor="middle" font-size="9" fill="var(--muted)" font-family="var(--mono)">${d.slice(5)}</text>`; }});
  const pts=arr.map((v,i)=>[x(i),y(v)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=`M${x(0).toFixed(1)} ${y(min).toFixed(1)} `+pts.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L${x(days.length-1).toFixed(1)} ${y(min).toFixed(1)} Z`;
  const col = isTok?'var(--c0)':'var(--c2)';
  let dots='';
  pts.forEach((p,i)=>{
    const lbl = isTok? fmt(arr[i])+' tokens' : (arr[i]*100).toFixed(1)+'% hit-rate';
    dots+=`<circle class="hpt" cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="9" fill="transparent" data-x="${p[0].toFixed(1)}" data-y="${p[1].toFixed(1)}" data-lbl="${days[i]} · ${lbl}"></circle>`;
  });
  const lastP=pts[pts.length-1];
  return `<div class="chart-wrap">
    <svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" id="bigChartSvg" style="display:block" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="bcg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${col}" stop-opacity=".30"/><stop offset="1" stop-color="${col}" stop-opacity="0"/>
      </linearGradient></defs>
      ${grid}${labels}${xlab}
      <path d="${area}" fill="url(#bcg)"/>
      <path d="${line}" stroke="${col}" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${lastP[0].toFixed(1)}" cy="${lastP[1].toFixed(1)}" r="4" fill="${col}" stroke="var(--surface)" stroke-width="2"/>
      ${dots}
    </svg>
    <div class="chart-tip" id="bigTip"></div>
  </div>`;
}
function donut(){
  const tb=DATA.tierBreakdown;
  const total=tb.exactCache+tb.semanticCache+tb.automationReplay+tb.liveLlm;
  const segs=[['exact',tb.exactCache],['semantic',tb.semanticCache],['automation',tb.automationReplay],['live',tb.liveLlm]];
  const R=54,C=2*Math.PI*R, cx=70,cy=70; let off=0; let circles='';
  segs.forEach(([k,v])=>{
    const frac=v/total, len=frac*C;
    circles+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${TIERDOT[k]}" stroke-width="16"
      stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`;
    off+=len;
  });
  const cached = ((tb.exactCache+tb.semanticCache+tb.automationReplay)/total*100).toFixed(0);
  return `<svg width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">${circles}
    <text x="70" y="64" text-anchor="middle" font-size="26" font-weight="800" fill="var(--text)" font-family="var(--mono)">${cached}%</text>
    <text x="70" y="82" text-anchor="middle" font-size="9.5" fill="var(--muted)">not live LLM</text></svg>`;
}

   VIEW: AUTOMATIONS  (MERGE — C lifecycle + C list + C Cowork three-pane)
   ========================================================================== */
function lifecycleStrip(){
  const counts={candidate:0,validating:0,trusted:0,stale:0};
  DATA.automations.forEach(a=>{ if(counts[a.state]!==undefined) counts[a.state]++; });
  const arrow=`<span class="lc-arrow">${svg(ICON.chevronRight,'')}</span>`;
  let flow='';
  LC_STAGES.forEach((s,i)=>{
    const active=state.autoStateFilter===s.key;
    flow+=`<button class="lc-stage ${active?'is-target':''}" data-lcstate="${s.key}" aria-pressed="${active}">
      <div class="lc-name"><span class="dot" style="background:${s.color}"></span>${s.label}</div>
      <div class="lc-count">${counts[s.key]}</div>
      <div class="lc-desc">${s.desc}</div>
    </button>`;
    if(i<LC_STAGES.length-1) flow+=arrow;
  });
  const stale=DATA.automations.filter(a=>a.staleness.drifted);
  let strip='';
  if(stale.length){
    const a=stale[0]; const bad=a.staleness.signals.find(s=>!s.fresh);
    strip=`<div class="stale-strip">${svg(ICON.alertTriangle,'')} <b>${stale.length} automation${stale.length>1?'s':''} de-advertised</b> — <span class="mono">${esc(a.slug)}</span> drifted: ${esc(bad?bad.detail:'')} · recompute queued.</div>`;
  }
  return `<div class="card" style="margin-bottom:12px">
    <div class="card-head">
      <h3>${svg(ICON.gitBranch,'sm')} Automation lifecycle</h3>
      <span class="spacer"></span>
      <span class="sub">candidate → validating → trusted → stale · click a stage to filter</span>
    </div>
    <div class="lc-flow">${flow}</div>
    ${strip}
  </div>`;
}
function matchAuto(a){
  if(state.autoStateFilter!=='all' && a.state!==state.autoStateFilter) return false;
  const q=state.autoSearch.toLowerCase().trim();
  if(!q) return true;
  return (a.title+' '+a.slug+' '+a.kind+' '+a.provenance.connector).toLowerCase().includes(q);
}
function autoList(){
  const list=DATA.automations.filter(matchAuto);
  const items = list.length ? list.map(a=>{
    const sel=a.id===state.selAuto?'sel':'';
    const stale=a.staleness.drifted;
    return `<button class="auto-item ${sel}" role="option" aria-selected="${a.id===state.selAuto}" data-auto="${a.id}">
      <div class="auto-item-top">
        <span class="kind-ico">${svg(KINDICO[a.kind],'sm')}</span>
        <span class="auto-item-title">${esc(a.title)}</span>
        ${a.requiresApproval?`<span title="requires approval">${svg(ICON.shieldCheck,'sm')}</span>`:''}
      </div>
      <div class="auto-item-sub">
        <span class="badge2 b-${a.state}"><span class="dotmark"></span>${a.state}</span>
        <span class="mono">v${a.version}</span>
        <span>· ${fmtShort(a.hits)} hits</span>
        ${stale?`<span style="color:var(--warn)">· drifted</span>`:''}
      </div>
    </button>`;
  }).join('') : `<div class="empty-note">No automations match.</div>`;
  return `<aside class="card auto-list" aria-label="Automation registry">
    <div class="auto-list-head">
      <div class="auto-list-title"><span>Registry</span><span class="mono" style="color:var(--muted);font-weight:600">${list.length} / ${DATA.automations.length}</span></div>
      <label class="search-box">
        ${svg(ICON.search,'sm')}
        <input type="text" id="autoSearch" placeholder="Search automations…" value="${esc(state.autoSearch)}" aria-label="Search automations" />
      </label>
      <div class="filter-chips" role="group" aria-label="Filter by state">
        ${['all','trusted','validating','candidate','stale'].map(s=>`<button class="chip ${state.autoStateFilter===s?'on':''}" data-state="${s}">${s==='all'?'All':s}</button>`).join('')}
      </div>
    </div>
    <div class="auto-items" id="autoItems" role="listbox" aria-label="Automations" tabindex="0">${items}</div>
  </aside>`;
}
function workflowTimeline(a){
  const steps=a.workflow.steps;
  const stepStatus=(idx)=>{
    if(a.state==='trusted'||a.state==='stale') return 'done';
    if(a.state==='candidate') return idx===0?'active':'pending';
    return idx<1?'done':(idx===1?'active':'pending'); /* validating */
  };
  return steps.map((s,i)=>{
    let cls=stepStatus(i);
    if(!s.reversible && a.requiresApproval && a.state!=='trusted') cls='gate';
    const nodeIcon = cls==='done'?ICON.check : cls==='gate'?ICON.shieldCheck : cls==='active'?ICON.refresh : ICON.chevronRight;
    const edge=a.workflow.edges.find(e=>e.from===s.id);
    return `<div class="tl-step ${cls}">
      <span class="tl-node">${svg(nodeIcon,'')}</span>
      <div class="tl-name">${esc(s.name)}</div>
      <div class="tl-sub">
        <span class="tag">${esc(s.type)}</span>
        ${s.reversible?'<span class="tag">reversible</span>':'<span class="tag irr">irreversible</span>'}
        ${edge?`<span class="muted">→ <span class="mono">${esc(edge.condition)}</span></span>`:''}
      </div>
    </div>`;
  }).join('');
}
function codeBlock(art){
  const lines=art.bodyExcerpt.map((l,i)=>`<div class="ln"><span class="gut">${i+1}</span><span class="src">${highlight(l,art.lang)}</span></div>`).join('');
  return `<div class="file-tab">${svg(ICON.fileCode,'sm')}<span class="fname">${esc(art.name)}</span><span class="lang">${esc(art.lang)}</span></div>
    <pre class="code">${lines}</pre>`;
}
function contextPane(a){
  const c=a.context;
  const vars=Object.entries(c.variables).map(([k,v])=>`<div class="kv"><span class="k">${esc(k)}</span><span class="val">${esc(typeof v==='object'?JSON.stringify(v):v)}</span></div>`).join('');
  const findings=Object.entries(c.findings).map(([k,v])=>{
    const val=Array.isArray(v)?`<span class="pill-list">${v.map(x=>`<span class="val-pill">${esc(x)}</span>`).join('')}</span>`:`<span class="val">${esc(v)}</span>`;
    return `<div class="kv"><span class="k">${esc(k)}</span>${val}</div>`;
  }).join('');
  const refs=c.referenced.map(f=>`<div class="file-ref">${svg(ICON.fileCode,'sm')} ${esc(f)}</div>`).join('');
  return `<div class="ctx-section"><div class="ctx-label">${svg(ICON.layers,'sm')} Variables</div>${vars}</div>
    <div class="ctx-section"><div class="ctx-label">${svg(ICON.sparkles,'sm')} Findings (mutable memory)</div>${findings}</div>
    <div class="ctx-section"><div class="ctx-label">${svg(ICON.fileCode,'sm')} Referenced files &amp; tools</div>${refs}</div>`;
}
function stalenessPane(a){
  return a.staleness.signals.map(s=>`<div class="signal ${s.fresh?'fresh':'drift'}">
      <span class="sig-ico">${svg(s.fresh?ICON.check:ICON.alertTriangle,'')}</span>

        <div class="sig-type">${esc(s.type)} <span class="tag">${esc(s.strategy)}</span></div>
        <div class="sig-detail">${esc(s.detail)}</div>

      <span class="sig-state">${s.fresh?'fresh':'stale'}</span>

}

          </div>
        </div>
      </div>
      <div class="card pane">
        <div class="pane-head">${svg(ICON.database,'sm')} Context — mutable memory <span class="count">${a.context.referenced.length} refs</span></div>

/* ============================================================================

   ========================================================================== */
function viewStaleness(){
  const rows=DATA.automations.slice().sort((a,b)=>(b.staleness.drifted?1:0)-(a.staleness.drifted?1:0)).map(a=>{
    const drift=a.staleness.drifted;
    return `<div class="stale-row ${drift?'drift':''}">
      <div class="lhs">
        <h3>${esc(a.title)}</h3>
        <div class="slug">${a.slug} · v${a.version} · ${a.kind.replace('_',' ')}</div>
        <div class="stale-sigs">
          ${a.staleness.signals.map(s=>`<div class="ssig ${s.fresh?'fresh':'stale'}" title="${esc(s.detail)}"><span class="sd2"></span><b style="text-transform:capitalize">${s.type}</b><span style="color:var(--muted);font-family:var(--mono);font-size:9.5px">${s.strategy}</span></div>`).join('')}
        </div>
      </div>
      <div class="rhs">
        ${drift?`<span class="badge2 b-drifted">${svg(ICON.alertTriangle,'sm')} drifted — de-advertised</span>`
               :`<span class="badge2 b-fresh">${svg(ICON.check,'sm')} fresh</span>`}
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted)">${a.staleness.signals.filter(s=>s.fresh).length}/${a.staleness.signals.length} signals fresh</div>
        ${drift?`<button class="btn sm" data-recompute="${a.id}">${svg(ICON.refresh,'sm')} Recompute</button>`:`<button class="btn ghost sm" data-open-auto="${a.id}">Inspect ${svg(ICON.chevronRight,'sm')}</button>`}
      </div>
    </div>`;
  }).join('');
  return `
    <div class="view-head">
      <div><h1>Staleness</h1><div class="sub">Every automation carries change-metric signals (code / config / data / time / external). When the world drifts past a fingerprint or probe, the automation is de-advertised and queued to recompute — so a replay never serves a stale answer.</div></div>
      <div class="actions"><span class="badge2 b-stale">${DATA.automations.filter(a=>a.staleness.drifted).length} drifted</span></div>
    </div>
    ${rows}`;
}

function approvalCards(){
  const awaiting=state.approvals.filter(a=>a.status==='awaiting');
  if(!awaiting.length){
    return `<div class="card"><div class="empty-note">${svg(ICON.check,'lg')}<br>Queue clear — every gated request has been resolved.</div></div>`;
  }
  return awaiting.map(ap=>{
    const auto=autoBySlug(ap.automationSlug);
    const isProd=ap.params.env==='prod';
    const params=Object.entries(ap.params).map(([k,v])=>`<div class="param-row"><span class="pk">${esc(k)}</span><b>${esc(v)}</b></div>`).join('');
    return `<div class="card approval-card" data-apr="${ap.id}">
      <div class="ac-head">
        <span class="kind-ico">${svg(ICON.gitBranch,'sm')}</span>
        <div style="flex:1;min-width:0">
          <div class="ac-title">${esc(auto.title)} <span class="ac-id">· ${esc(ap.id)}</span></div>
          <div class="muted" style="font-size:11.5px">${esc(auto.slug)} · requested ${timeAgo(ap.requestedAt)}</div>
        </div>
        <span class="badge2 b-gated">${svg(ICON.alertTriangle,'sm')} gated</span>
        ${isProd?`<span class="badge2 b-no">PROD</span>`:`<span class="badge2 b-yes">STG</span>`}
      </div>
      <div class="ac-body">
        <div class="ac-block">
          <div class="ac-lbl">Requested params</div>
          ${params}
        </div>
        <div class="ac-block">
          <div class="ac-lbl">Blast radius</div>
          <div class="blast">
            <div class="blast-head">${svg(ICON.alertTriangle,'sm')} irreversible step: kubectl apply rollout</div>
            ${esc(ap.blastRadius)}
          </div>
        </div>
      </div>
      <div class="ac-foot">
        <span class="req">Requested by <span class="mono">${esc(ap.requestedBy)}</span> via cowork</span>
        <button class="btn danger sm" data-apract="reject" data-id="${ap.id}">${svg(ICON.x,'sm')} Reject</button>
        <button class="btn success sm" data-apract="approve" data-id="${ap.id}">${svg(ICON.check,'sm')} Approve</button>
        <button class="btn primary sm" data-apract="run" data-id="${ap.id}">${svg(ICON.play,'sm')} Approve &amp; Run</button>
      </div>
    </div>`;
  }).join('');
}
function gatedWorkflowTimeline(){
  const a=autoBySlug('deploy-service-to-env');
  return a.workflow.steps.map((s,i)=>{
    const cls=!s.reversible?'gate':(i<2?'done':'pending');
    const nodeIcon = cls==='done'?ICON.check : cls==='gate'?ICON.shieldCheck : ICON.chevronRight;
    return `<div class="tl-step ${cls}">
      <span class="tl-node">${svg(nodeIcon,'')}</span>
      <div class="tl-name">${esc(s.name)}</div>

  }).join('');
}
function approvalLogRows(){

}

/* ============================================================================
   RENDER + ROUTER  (single dispatcher, Option A)
   ========================================================================== */
const VIEWS={overview:viewOverview,hot:viewHot,automations:viewAutomations,staleness:viewStaleness,approvals:viewApprovals,events:viewEvents};
function syncNavBadges(){
  const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=v; };
  set('hotBadge', DATA.clusters.length);
  set('autoBadge', DATA.automations.length);
  set('staleBadge', DATA.automations.filter(a=>a.staleness.drifted).length);
  set('apprBadge', state.approvals.filter(a=>a.status==='awaiting').length);
  set('eventsBadge', fmt(DATA.kpis.eventsToday));
}
function render(){
  document.getElementById('main').innerHTML=VIEWS[state.view]();
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.view===state.view));
  syncNavBadges();
  bindMain();
}
function setView(v){ state.view=v; render(); }

/* ============================================================================
   4) EVENT BINDING  (delegated per-render wiring)
   ========================================================================== */
function bindMain(){
  const main=document.getElementById('main');

  /* chart hover tooltip */
  const tip=document.getElementById('bigTip');
  if(tip){
    main.querySelectorAll('.hpt').forEach(pt=>{
      pt.addEventListener('mouseenter',()=>{
        const svgEl=document.getElementById('bigChartSvg');
        const rect=svgEl.getBoundingClientRect();
        const wrapRect=svgEl.parentElement.getBoundingClientRect();
        const scale=rect.width/620;
        tip.style.left=(parseFloat(pt.dataset.x)*scale + (rect.left-wrapRect.left))+'px';
        tip.style.top=(parseFloat(pt.dataset.y)*(rect.height/240) + (rect.top-wrapRect.top))+'px';
        const parts=pt.dataset.lbl.split(' · ');
        tip.innerHTML=`<b>${parts[1]}</b><br><span style="color:var(--muted)">${parts[0]}</span>`;
        tip.style.opacity='1';
      });
      pt.addEventListener('mouseleave',()=>{ tip.style.opacity='0'; });
    });
  }

  /* chart metric toggle */
  main.querySelectorAll('[data-metric]').forEach(b=>b.addEventListener('click',()=>{
    state.chartMetric=b.dataset.metric;
    const card=b.closest('.card'); card.querySelector('.card-body').innerHTML=bigChart();
    card.querySelectorAll('[data-metric]').forEach(x=>x.classList.toggle('on',x.dataset.metric===state.chartMetric));
    bindMain();
  }));

  /* sortable headers */
  main.querySelectorAll('th.sortable').forEach(th=>th.addEventListener('click',()=>{
    const k=th.dataset.sort;
    if(state.sortKey===k) state.sortDir*=-1; else { state.sortKey=k; state.sortDir = (k==='promptNorm'||k==='automatable')?1:-1; }
    document.getElementById('lbContainer').innerHTML=leaderboard(); bindMain();
  }));

  /* cluster row select */
  main.querySelectorAll('tr[data-cluster]').forEach(tr=>tr.addEventListener('click',()=>{
    state.selCluster=tr.dataset.cluster;
    main.querySelectorAll('tr[data-cluster]').forEach(r=>r.classList.toggle('sel',r.dataset.cluster===state.selCluster));
    const rail=document.getElementById('rail');
    if(state.view==='overview'){
      const feedCard=rail.querySelector('.rail-card:last-child');
      rail.innerHTML=railFor(state.selCluster);
      if(feedCard) rail.appendChild(feedCard);
    } else { rail.innerHTML=railFor(state.selCluster); }
    bindMain();
  }));

  /* leaderboard filter */
  const lbf=document.getElementById('lbFilter');
  if(lbf) lbf.addEventListener('input',()=>{ state.filter=lbf.value;
    const cont=document.getElementById('lbContainer'); cont.innerHTML=leaderboard();
    const ni=cont.querySelector('#lbFilter'); ni.focus(); ni.setSelectionRange(ni.value.length,ni.value.length);
    bindMain();
  });
  /* verdict chips */
  main.querySelectorAll('[data-verdict]').forEach(ch=>ch.addEventListener('click',()=>{
    state.verdictFilter=ch.dataset.verdict;
    document.getElementById('lbContainer').innerHTML=leaderboard(); bindMain();
  }));

  /* ---- Automations: lifecycle stages ---- */
  main.querySelectorAll('[data-lcstate]').forEach(b=>b.addEventListener('click',()=>{
    state.autoStateFilter = state.autoStateFilter===b.dataset.lcstate ? 'all' : b.dataset.lcstate;
    render();
  }));
  /* automation state chips */
  main.querySelectorAll('[data-state]').forEach(ch=>ch.addEventListener('click',()=>{
    state.autoStateFilter=ch.dataset.state; render();
  }));
  /* automation search */
  const as=document.getElementById('autoSearch');
  if(as) as.addEventListener('input',()=>{ state.autoSearch=as.value;
    const list=document.querySelector('.auto-list'); const fresh=document.createElement('div'); fresh.innerHTML=autoList();
    list.replaceWith(fresh.firstElementChild);
    const ni=document.getElementById('autoSearch'); ni.focus(); ni.setSelectionRange(ni.value.length,ni.value.length);
    bindMain();
  });
  /* automation list select */
  main.querySelectorAll('.auto-item[data-auto]').forEach(b=>b.addEventListener('click',()=>{
    state.selAuto=b.dataset.auto;
    main.querySelectorAll('.auto-item').forEach(x=>{ const on=x.dataset.auto===state.selAuto; x.classList.toggle('sel',on); x.setAttribute('aria-selected',on); });
    const dt=document.getElementById('autoDetail'); if(dt){ dt.outerHTML=autoDetail(); bindMain(); }
  }));
  /* automation list keyboard nav */
  const aItems=document.getElementById('autoItems');
  if(aItems) aItems.addEventListener('keydown',e=>{
    if(e.key!=='ArrowDown'&&e.key!=='ArrowUp') return;
    const items=Array.from(main.querySelectorAll('.auto-item'));
    const idx=items.findIndex(i=>i.dataset.auto===state.selAuto);
    const next=e.key==='ArrowDown'?Math.min(items.length-1,idx+1):Math.max(0,idx-1);
    if(items[next]){ state.selAuto=items[next].dataset.auto; e.preventDefault();
      items.forEach(x=>{ const on=x.dataset.auto===state.selAuto; x.classList.toggle('sel',on); x.setAttribute('aria-selected',on); });
      const dt=document.getElementById('autoDetail'); if(dt){ dt.outerHTML=autoDetail(); bindMain(); }
      document.querySelector('.auto-item.sel')?.focus();
    }
  });
  /* automation detail actions */
  main.querySelectorAll('[data-act]').forEach(b=>b.addEventListener('click',()=>autoAction(b.dataset.act)));

  /* open-auto (jump to registry) */
  main.querySelectorAll('[data-open-auto]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation(); state.selAuto=b.dataset.openAuto; setView('automations');
  }));
  /* goto */
  main.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.goto)));

  /* refresh / re-index */
  const rb=document.getElementById('refreshBtn');
  if(rb) rb.addEventListener('click',()=>toast('ok','Re-index queued','snapshot 0723d89 → probing automations.'));

  /* recompute (staleness view) */
  main.querySelectorAll('[data-recompute]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation(); autoAction('recompute', b.dataset.recompute);
  }));

  /* approvals */
  main.querySelectorAll('[data-apract]').forEach(b=>b.addEventListener('click',()=>resolveApproval(b.dataset.id,b.dataset.apract)));

  /* events filter + tier seg */
  const ef=document.getElementById('evtFilter');
  if(ef) ef.addEventListener('input',()=>{ state.evtFilter=ef.value; document.getElementById('fullFeed').innerHTML=fullFeed(); });
  main.querySelectorAll('[data-served]').forEach(b=>b.addEventListener('click',()=>{
    state.evtServed=b.dataset.served;
    main.querySelectorAll('[data-served]').forEach(x=>x.classList.toggle('on',x.dataset.served===state.evtServed));
    document.getElementById('fullFeed').innerHTML=fullFeed();
  }));
}

/* ---- automation actions (promote / recompute / run) ---- */
function autoAction(act, idOverride){
  const a=idOverride?autoById(idOverride):(autoById(state.selAuto)||DATA.automations[0]);
  if(act==='gotoApprovals'){ setView('approvals'); return; }
  if(act==='recompute'){
    a.staleness.drifted=false; a.staleness.signals.forEach(s=>s.fresh=true); a.state='trusted'; a.version++;
    toast('ok',`Recomputed ${a.slug}`,`Re-indexed and re-advertised as trusted v${a.version}.`);
    render(); return;
  }
  if(act==='promote'){
    a.state='validating';
    toast('ok',`Promoted ${a.slug}`,'Now validating agreement against live LLM.');
    render(); return;
  }
  if(act==='run'){
    toast('ok',`Replayed ${a.slug}`,`Served in ~${a.kind==='workflow'?71:44}ms for ${fmt(a.replayTokensPerRun)} tokens (~0 LLM).`);
    return;
  }
}

/* ---- approvals resolution (mutates working copy) ---- */
function resolveApproval(id, action){
  const ap=state.approvals.find(a=>a.id===id); if(!ap) return;
  const map={approve:'approved',reject:'rejected',run:'ran'};
  ap.status=map[action];
  state.approvalLog.unshift({action:map[action],svc:ap.params.service,env:ap.params.env,by:'dominic@aziro.com'});
  const kind = action==='reject' ? 'danger' : action==='run' ? 'info' : 'ok';
  const msg = action==='reject' ? `Rejected ${ap.params.service}/${ap.params.env}`
            : action==='run' ? `Deploying ${ap.params.service} → ${ap.params.env}`
            : `Approved ${ap.params.service}/${ap.params.env}`;
  const sub = action==='run' ? 'Workflow handed to runner; rollout started.'
            : action==='approve' ? 'Cleared to run on next request.'
            : 'Request denied; requester notified.';
  toast(kind,msg,sub);
  render();
}

/* ---- toast ---- */
function toast(kind,msg,sub){
  const w=document.getElementById('toastWrap');
  const t=document.createElement('div'); t.className='toast '+kind;
  const ic = kind==='danger'?ICON.x : kind==='warn'?ICON.alertTriangle : kind==='info'?ICON.play : ICON.check;
  t.innerHTML=`<div class="tic">${svg(ic,'sm')}</div><div><div class="t-msg">${esc(msg)}</div>${sub?`<div class="t-sub">${esc(sub)}</div>`:''}</div>`;
  w.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .3s,transform .3s'; t.style.opacity='0'; t.style.transform='translateY(8px)'; setTimeout(()=>t.remove(),320); },3400);
}

/* ---- theme (reads state, so runs only after init) ---- */
const SUN="M12 1v2 M12 21v2 M4.2 4.2l1.4 1.4 M18.4 18.4l1.4 1.4 M1 12h2 M21 12h2 M4.2 19.8l1.4-1.4 M18.4 5.6l1.4-1.4 M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z";
const MOON="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z";
function applyThemeIcon(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.getElementById('themeIcon').innerHTML=`<path d="${dark?MOON:SUN}"/>`;
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme',cur==='dark'?'light':'dark');
  applyThemeIcon();
  render(); /* re-render so charts pick up fresh CSS-var colors */
}

/* ---- top-level (non-main) wiring: safe here because `state` is initialized ---- */
document.getElementById('themeToggle').addEventListener('click',toggleTheme);
document.querySelectorAll('.nav-item').forEach(n=>n.addEventListener('click',()=>setView(n.dataset.view)));

const gs=document.getElementById('globalSearch');
gs.addEventListener('input',()=>{
  state.filter=gs.value;
  if(state.view!=='overview'&&state.view!=='hot'){ setView('hot'); }
  else { const c=document.getElementById('lbContainer'); if(c){ c.innerHTML=leaderboard(); bindMain(); } }
});
gs.addEventListener('keydown',e=>{ if(e.key==='Enter'){ setView('hot'); }});
document.addEventListener('keydown',e=>{ if(e.key==='/'&&document.activeElement!==gs){ e.preventDefault(); gs.focus(); }});

const lt=document.getElementById('liveToggle');
lt.addEventListener('click',()=>{
  state.live=!state.live;
  lt.classList.toggle('paused',!state.live);
  lt.setAttribute('aria-pressed',state.live);
  document.getElementById('liveLabel').textContent=state.live?'Live':'Paused';
});

];
const USERS=["u_7af3","u_2c19","u_91be","u_5d77","u_a0f1","u_c4e2","u_d8a3"];
let simBase=Date.parse("2026-06-30T09:42:00Z");
function pushEvent(){
  if(!state.live) return;
  const tmpl=SAMPLE_PROMPTS[Math.floor(Math.random()*SAMPLE_PROMPTS.length)];

/* ============================================================================
   5) INITIAL RENDER — the VERY LAST statements.
   `state` is initialized and the DOM is parsed (script is at end of <body>),
   so applyThemeIcon()/render() can safely read both. No TDZ access — and no
   inline-apply workaround needed (this is exactly what Option C lacked).
   ========================================================================== */
applyThemeIcon();
render();
