name: ci
on:
  push:
    branches: [main]
  pull_request: {}
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...

  # NOTE: once the real engine lands, add a CGO matrix (tree-sitter + sqlite),
  # a -tags hosted build, golden-graph fixture tests, and govulncheck.
