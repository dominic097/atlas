name: ci
on:
  push:
    branches: [main]
  pull_request: {}
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    # Atlas is a CGO binary (tree-sitter grammars are C, sqlite is C). ubuntu-latest
    # ships gcc, so CGO_ENABLED=1 is set explicitly to keep the build honest and to
    # ensure the CGO test suite actually runs (tree-sitter + sqlite).
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x' # must track `go` directive in go.mod
          cache: true
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...

  # NOTE: once the real engine lands, add a CGO matrix (tree-sitter + sqlite),
  # a -tags hosted build, golden-graph fixture tests, and govulncheck.
