name: release

# Cut a release by pushing a semver tag:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # Binaries + Linux packages + archives + checksums + SBOMs + keyless cosign
  # signatures + the Homebrew cask + the GitHub Release. CGO (tree-sitter) is
  # cross-compiled inside goreleaser-cross, which carries the linux gcc cross
  # toolchains and the darwin osxcross toolchain. Extra release helpers are
  # mounted into the container without dirtying the checkout.
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload artifacts
      id-token: write # keyless cosign (Fulcio/Rekor OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog + version are correct

      - name: Install Syft for SBOM generation
        run: |
          mkdir -p "$RUNNER_TEMP/atlas-tools"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$RUNNER_TEMP/atlas-tools"

      - name: goreleaser release (cross-compiled CGO)
        run: |
          docker run --rm \
            -e GITHUB_TOKEN="${{ secrets.ATLAS_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}" \
            -e HOMEBREW_TAP_TOKEN="${{ secrets.HOMEBREW_TAP_TOKEN }}" \
            -e COSIGN_YES=true \
            -e ACTIONS_ID_TOKEN_REQUEST_URL \
            -e ACTIONS_ID_TOKEN_REQUEST_TOKEN \
            -v "$PWD":/src \
            -v "$RUNNER_TEMP/atlas-tools/syft":/usr/local/bin/syft:ro \
            -w /src \
            ghcr.io/goreleaser/goreleaser-cross:v1.25.0 \
            release --clean

  npm:
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Check npm publish token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is not configured; failing release because npm publish is part of the e2e release gate." >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Set release version
        run: echo "ATLAS_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Align npm package version to release tag
        working-directory: npm/atlas
        run: |
          node -e 'const fs = require("fs"); const p = JSON.parse(fs.readFileSync("package.json", "utf8")); p.version = process.env.ATLAS_VERSION; fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");'

      - name: Publish local binary npm wrapper
        working-directory: npm/atlas
        env:
          ATLAS_SKIP_DOWNLOAD: "1"
        run: npm publish --access public

      - name: Verify npm package and installed binary
        run: |
          set -euo pipefail
          for i in {1..12}; do
            published="$(npm view "@aziron/atlas@$ATLAS_VERSION" version --registry=https://registry.npmjs.org/ 2>/dev/null || true)"
            if [ "$published" = "$ATLAS_VERSION" ]; then
              break
            fi
            sleep 5
          done
          test "$published" = "$ATLAS_VERSION"

          tmp="$(mktemp -d)"
          npm_config_prefix="$tmp/prefix" npm install -g "@aziron/atlas@$ATLAS_VERSION"
          "$tmp/prefix/bin/atlas" version | tee "$tmp/version.txt"
          grep "atlas $ATLAS_VERSION" "$tmp/version.txt"
          "$tmp/prefix/bin/atlas" --db "sqlite://$tmp/atlas.db" --repo npm/release-smoke status
