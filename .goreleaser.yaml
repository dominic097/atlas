# goreleaser configuration for Atlas.
#
# Atlas is a CGO binary (tree-sitter grammars are C), so cross-compilation needs
# real cross toolchains, not just GOOS/GOARCH. This config is built to run inside
# the `ghcr.io/goreleaser/goreleaser-cross` image (see .github/workflows/release.yml),
# which bundles the linux gcc cross-compilers and osxcross for darwin CGO, plus
# cosign + syft for signing and SBOMs. The per-target CC/CXX overrides below map
# each GOOS/GOARCH onto the toolchain that image provides.
#
# Run locally (snapshot, no publish):
#   docker run --rm -v "$PWD":/src -w /src ghcr.io/goreleaser/goreleaser-cross:v1.25.0 \
#       release --snapshot --clean
version: 2

project_name: atlas

before:
  hooks:
    - go mod download

builds:
  - id: atlas
    main: ./cmd/atlas
    binary: atlas
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{ .Version }}
      - -X main.Commit={{ .Commit }}
      - -X main.Date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-gnu-gcc
          - CXX=x86_64-linux-gnu-g++
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++
      - goos: darwin
        goarch: amd64
        env:
          - CC=o64-clang
          - CXX=o64-clang++
      - goos: darwin
        goarch: arm64
        env:
          - CC=oa64-clang
          - CXX=oa64-clang++

archives:
  - id: atlas
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

nfpms:
  - id: atlas-linux-packages
    package_name: atlas
    ids:
      - atlas
    vendor: atlas
    homepage: "https://github.com/aziron-ai/atlas"
    maintainer: "atlas maintainers <atlas-maintainers@users.noreply.github.com>"
    description: "Atlas deterministic local code-intelligence CLI using embedded SQLite by default."
    license: "Apache-2.0"
    bindir: /usr/bin
    formats:
      - apk
      - deb
      - rpm
    dependencies:
      - git
    contents:
      - src: LICENSE
        dst: /usr/share/doc/atlas/LICENSE
      - src: README.md
        dst: /usr/share/doc/atlas/README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Supply-chain attestation: an SBOM per release archive (syft) ...
sboms:
  - id: archive
    artifacts: archive

# ... and a keyless cosign signature over the checksums file. Verifiable with:
#   cosign verify-blob --certificate checksums.txt.pem \
#       --signature checksums.txt.sig \
#       --certificate-identity-regexp '.*' \
#       --certificate-oidc-issuer https://token.actions.githubusercontent.com checksums.txt
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    certificate: "${artifact}.pem"
    signature: "${artifact}.sig"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"

# Homebrew tap: pushes Casks/atlas.rb to dominic097/homebrew-atlas.
# Requires a HOMEBREW_TAP_TOKEN secret (PAT with write access to that tap repo).
homebrew_casks:
  - name: atlas
    ids:
      - atlas
    binary: atlas
    repository:
      owner: dominic097
      name: homebrew-atlas
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/aziron-ai/atlas"
    description: "Atlas deterministic code intelligence: symbols, calls, routes, impact, cross-repo."
    license: "Apache-2.0"
    url:
      template: "https://github.com/aziron-ai/atlas/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
      verified: github.com/aziron-ai/atlas/
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/atlas"]
          end

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: aziron-ai
    name: atlas
  target_commitish: main
  draft: false
  prerelease: auto
  name_template: "Atlas {{ .Tag }}"
